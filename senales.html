<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test NIC - Señales</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #e67e22;
            --correct: #009543;
            --wrong: #ff3b30;
            --text: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; padding: 20px; }
        
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        #progreso-texto { font-size: 14px; color: #888; }
        .btn-salir {
            background: none; border: 1px solid #444; color: #ccc;
            padding: 5px 12px; border-radius: 5px; cursor: pointer;
        }

        .progress-bar {
            width: 100%; height: 6px; background: #333;
            border-radius: 10px; margin-bottom: 25px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: var(--accent);
            width: 0%; transition: width 0.3s;
        }

        .question-card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cat-badge {
            display: inline-block;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 99px;
            margin-bottom: 12px;
            background: #333;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .cat-fundamental { background: #3a1a1a; color: #ff6b6b; }
        .cat-indicadora   { background: #1a2a3a; color: #6ab0ff; }
        .cat-cartel       { background: #2a2a1a; color: #f0c040; }
        .cat-manual       { background: #1a3a1a; color: #6fd88a; }

        h2 { font-size: 1.1rem; line-height: 1.5; margin-bottom: 20px; margin-top: 0; }

        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            background: #2a2a2a; border: 1px solid #333; color: white;
            padding: 16px; border-radius: 12px; text-align: left;
            font-size: 14px; cursor: pointer; transition: 0.2s; line-height: 1.4;
        }
        .opt-btn:hover:not(:disabled) { background: #333; border-color: #555; }
        .opt-btn.correct { background: var(--correct) !important; border-color: var(--correct); }
        .opt-btn.wrong   { background: var(--wrong)   !important; border-color: var(--wrong); }
        .opt-btn.reveal  { background: #005a28 !important; border-color: var(--correct); opacity: 0.85; }

        .tip-box {
            display: none;
            margin-top: 16px;
            padding: 14px;
            background: #252525;
            border-left: 3px solid var(--accent);
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
        }
        .tip-box.show { display: block; }

        .btn-next {
            width: 100%; background: var(--accent); color: white;
            border: none; padding: 15px; border-radius: 10px;
            font-weight: bold; margin-top: 16px; cursor: pointer;
            display: none; font-size: 15px;
        }
        .btn-next.show { display: block; }

        .results-list {
            text-align: left; background: #000; padding: 15px;
            border-radius: 10px; font-size: 13px; max-height: 300px;
            overflow-y: auto; margin-top: 15px;
        }
        .result-item { margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <div class="quiz-header">
            <div id="progreso-texto">Pregunta 1/26</div>
            <button class="btn-salir" onclick="window.location.href='nic.html'">✕ Salir</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        
        <div class="question-card">
            <div id="cat-badge" class="cat-badge"></div>
            <h2 id="question-text">Cargando pregunta...</h2>
            <div id="options-container" class="options-grid"></div>
            <div id="tip-box" class="tip-box"></div>
            <button id="btn-next" class="btn-next" onclick="nextQuestion()">SIGUIENTE PREGUNTA →</button>
        </div>
    </div>

    <div id="results-screen" class="hidden">
        <div class="question-card" style="text-align:center;">
            <h1 id="score-percent">0%</h1>
            <p id="score-text"></p>
            <div id="failed-review" class="results-list"></div>
            <button class="btn-next" style="display:block;" onclick="location.reload()">REPETIR TEST</button>
            <button class="btn-next" style="display:block; background:#444; margin-top:10px;" onclick="window.location.href='nic.html'">MENÚ NIC</button>
        </div>
    </div>
</div>

    a: "Cuando el maquinista comunica al PCC la señal ante la que está detenido para recibir instrucciones",
    opts: [
      "Cuando el maquinista comunica al PCC la señal ante la que está detenido para recibir instrucciones",
      "Para que el personal de mantenimiento sepa qué señales revisar en el turno de noche",
      "Para identificar el kilómetro exacto de la vía en los planos de infraestructura",
      "Para registrar automáticamente los datos de paso en el sistema de gestión de tráfico"
    ],
    tip: "En situaciones de incidencia, la comunicación precisa entre maquinista y PCC es vital. Indicar el número de señal elimina ambigüedades sobre la posición del tren."
  },
  {
    cat: "fundamental",
    q: "¿Cuál es la diferencia entre la acción requerida por una señal amarilla y la requerida por una señal de parada (rojo)?",
    a: "El amarillo permite seguir circulando preparándose para parar; el rojo obliga a detenerse antes de la señal",
    opts: [
      "El amarillo permite seguir circulando preparándose para parar; el rojo obliga a detenerse antes de la señal",
      "El amarillo obliga a parar a mitad del cantón; el rojo a parar en la señal misma",
      "Ambos obligan a detener el tren; el amarillo permite continuar si el PCC lo confirma",
      "No hay diferencia de acción; ambos son señales de precaución con diferente urgencia"
    ],
    tip: "El amarillo y el rojo son señales de distinta naturaleza: una advierte, la otra ordena. No confundir 'prepararse para parar' con 'parar ya'."
  }
];

// Mezclar preguntas al inicio
let questions = [...db].sort(() => Math.random() - 0.5);
let currentIdx = 0;
let hits = 0;
let fails = [];

function initQuiz() {
    document.getElementById('progreso-texto').innerText = `Pregunta 1/${questions.length}`;
    showQuestion();
}

function showQuestion() {
    const q = questions[currentIdx];

    document.getElementById('progreso-texto').innerText = `Pregunta ${currentIdx + 1}/${questions.length}`;
    document.getElementById('progress-fill').style.width = `${(currentIdx / questions.length) * 100}%`;
    document.getElementById('question-text').innerText = q.q;
    document.getElementById('btn-next').classList.remove('show');
    document.getElementById('tip-box').classList.remove('show');
    document.getElementById('tip-box').innerText = '';

    // Badge de categoría
    const badge = document.getElementById('cat-badge');
    badge.innerText = CAT_LABELS[q.cat] || q.cat;
    badge.className = 'cat-badge cat-' + q.cat;

    const container = document.getElementById('options-container');
    container.innerHTML = '';

    const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
    shuffled.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(btn, opt, q.a, q.tip);
        container.appendChild(btn);
    });
}

function checkAnswer(btn, selected, correct, tip) {
    const buttons = document.querySelectorAll('.opt-btn');
    buttons.forEach(b => b.disabled = true);

    const tipBox = document.getElementById('tip-box');
    tipBox.innerText = tip;
    tipBox.classList.add('show');

    if (selected === correct) {
        btn.classList.add('correct');
        hits++;
        setTimeout(nextQuestion, 1200);
    } else {
        btn.classList.add('wrong');
        fails.push({ q: questions[currentIdx].q, a: correct });
        guardarFallo(questions[currentIdx].q, questions[currentIdx].opts, correct, "NIC: Señales");
        buttons.forEach(b => { if (b.innerText === correct) b.classList.add('reveal'); });
        document.getElementById('btn-next').classList.add('show');
    }
}

function nextQuestion() {
    currentIdx++;
    if (currentIdx < questions.length) {
        showQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('results-screen').classList.remove('hidden');

    const percent = Math.round((hits / questions.length) * 100);
    document.getElementById('score-percent').innerText = `${percent}%`;
    document.getElementById('score-text').innerText = `Has acertado ${hits} de ${questions.length}`;

    const review = document.getElementById('failed-review');
    if (fails.length > 0) {
        review.innerHTML = '<strong>Tus errores:</strong><br><br>' +
            fails.map(f => `<div class="result-item">• ${f.q}<br><span style="color:var(--correct)">✔ ${f.a}</span></div>`).join('');
    } else {
        review.innerHTML = '¡Perfecto! No has tenido ningún fallo.';
    }
}

function guardarFallo(pregunta, opciones, respuestaCorrecta, modulo) {
    try {
        let listaFallos = JSON.parse(localStorage.getItem('mis_fallos')) || [];
        if (!listaFallos.find(f => f.q === pregunta)) {
            listaFallos.push({ id: Date.now(), modulo, q: pregunta, opts: opciones, a: respuestaCorrecta });
            localStorage.setItem('mis_fallos', JSON.stringify(listaFallos));
        }
    } catch(e) {}
}

initQuiz();
</script>
