<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test PRL Campus</title>
<style>
    :root { --bg:#121212; --card:#1e1e1e; --accent:#27ae60; --correct:#009543; --wrong:#ff3b30; --text:#ffffff; --muted:#888; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; min-height:100vh; }
    .container { width:100%; max-width:500px; padding:20px; }

    .menu-title { text-align:center; font-size:1.4rem; font-weight:700; margin-bottom:4px; margin-top:8px; }
    .menu-subtitle { text-align:center; color:var(--muted); font-size:13px; margin-bottom:22px; }

    .section-sep {
        display:flex; align-items:center; gap:10px;
        margin:18px 0 12px;
    }
    .section-sep span {
        font-size:11px; font-weight:700; text-transform:uppercase;
        letter-spacing:.08em; white-space:nowrap; padding:3px 10px;
        border-radius:99px; background:#1a3a1a; color:#7de87d;
    }
    .section-sep::after { content:''; flex:1; height:1px; background:#2a2a2a; }

    .menu-grid { display:flex; flex-direction:column; gap:10px; }
    .menu-btn {
        background:var(--card); border:1px solid #333; color:var(--text);
        padding:16px 18px; border-radius:14px; text-align:left;
        cursor:pointer; transition:0.2s; display:flex;
        justify-content:space-between; align-items:center; width:100%;
        font-family:inherit;
    }
    .menu-btn:hover { background:#2a2a2a; border-color:var(--accent); }
    .menu-btn .label { font-size:15px; font-weight:600; }
    .menu-btn .meta { font-size:12px; color:var(--muted); margin-top:3px; }
    .menu-btn .arrow { color:var(--accent); font-size:20px; flex-shrink:0; margin-left:10px; }
    .menu-btn-all { background:var(--accent); border-color:var(--accent); margin-top:6px; }
    .menu-btn-all:hover { opacity:.9; }

    .quiz-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    #progreso-texto { font-size:14px; color:var(--muted); }
    .btn-salir { background:none; border:1px solid #444; color:#ccc; padding:5px 12px; border-radius:5px; cursor:pointer; font-size:13px; font-family:inherit; }
    .btn-salir:hover { border-color:#888; color:#fff; }
    .progress-bar { width:100%; height:6px; background:#333; border-radius:10px; margin-bottom:22px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--accent); width:0%; transition:width .3s; }
    .question-card { background:var(--card); padding:24px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.5); }
    .cat-badge { display:inline-block; font-size:11px; padding:3px 10px; border-radius:99px; margin-bottom:12px; text-transform:uppercase; letter-spacing:.06em; background:#1a3a1a; color:#7de87d; }
    h2 { font-size:1rem; line-height:1.55; margin-bottom:18px; margin-top:0; }
    .options-grid { display:flex; flex-direction:column; gap:10px; }
    .opt-btn { background:#2a2a2a; border:1px solid #333; color:white; padding:13px 14px; border-radius:12px; text-align:left; font-size:13px; cursor:pointer; transition:0.18s; line-height:1.4; font-family:inherit; }
    .opt-btn:hover:not(:disabled) { background:#333; border-color:#555; }
    .opt-btn.correct { background:var(--correct) !important; border-color:var(--correct); }
    .opt-btn.wrong   { background:var(--wrong)   !important; border-color:var(--wrong); }
    .opt-btn.reveal  { background:#005a28 !important; border-color:var(--correct); opacity:.85; }
    .btn-next { width:100%; background:var(--accent); color:white; border:none; padding:14px; border-radius:10px; font-weight:bold; margin-top:14px; cursor:pointer; display:none; font-size:15px; font-family:inherit; }
    .btn-next.show { display:block; }

    .results-list { text-align:left; background:#000; padding:15px; border-radius:10px; font-size:13px; max-height:340px; overflow-y:auto; margin-top:14px; }
    .result-item { margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:6px; }
    .result-item .rq { color:#ddd; }
    .result-item .ra { color:#27ae60; margin-top:2px; }
    .hidden { display:none; }
</style>
</head>
<body>
<div class="container">

    <!-- MENU -->
    <div id="menu-screen">
        <div class="menu-title">Test PRL Campus</div>
        <div class="menu-subtitle">Elige un bloque de estudio</div>
        <div class="section-sep"><span>📋 Bloques</span></div>
        <div class="menu-grid" id="grid-bloques"></div>
    </div>

    <!-- QUIZ -->
    <div id="quiz-screen" class="hidden">
        <div class="quiz-header">
            <div id="progreso-texto">Pregunta 1/30</div>
            <button class="btn-salir" onclick="volverMenu()">✕ Salir</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="question-card">
            <div class="cat-badge" id="cat-badge">PRL</div>
            <h2 id="question-text">Cargando...</h2>
            <div id="options-container" class="options-grid"></div>
            <button id="btn-next" class="btn-next" onclick="nextQuestion()">SIGUIENTE →</button>
        </div>
    </div>

    <!-- RESULTADOS -->
    <div id="results-screen" class="hidden">
        <div class="question-card" style="text-align:center;">
            <h1 id="score-percent" style="font-size:52px;margin:10px 0">0%</h1>
            <p id="score-text" style="color:var(--muted);font-size:14px;margin-bottom:4px"></p>
            <div id="failed-review" class="results-list"></div>
            <button class="btn-next show" onclick="repetirBloque()">🔄 REPETIR BLOQUE</button>
            <button class="btn-next show" style="background:#444;margin-top:10px;" onclick="volverMenu()">🏠 ELEGIR OTRO BLOQUE</button>
        </div>
    </div>

</div>

var LETTERS = ['a', 'b', 'c', 'd'];
var currentBlockIdx = null;
var questions = [];
var currentIdx = 0;
var hits = 0;
var fails = [];

function buildMenu() {
    var grid = document.getElementById('grid-bloques');
    grid.innerHTML = '';
    bloques.forEach(function(bl, i) {
        var btn = document.createElement('button');
        btn.className = 'menu-btn';
        btn.innerHTML = '<div><div class="label">' + bl.nombre + '</div><div class="meta">Preguntas ' + (bl.start_num) + '–' + (bl.end_num) + ' · ' + bl.count + ' preguntas</div></div><span class="arrow">›</span>';
        btn.onclick = function(){ startBlock(i); };
        grid.appendChild(btn);
    });
    var btnAll = document.createElement('button');
    var total = bloques.reduce(function(acc, b){ return acc + b.count; }, 0);
    btnAll.className = 'menu-btn menu-btn-all';
    btnAll.innerHTML = '<div><div class="label">📚 Todas las preguntas</div><div class="meta">' + total + ' preguntas, en orden</div></div><span class="arrow">›</span>';
    btnAll.onclick = function(){ startAll(); };
    grid.appendChild(btnAll);
}

function startBlock(i) {
    currentBlockIdx = i;
    questions = bloques[i].questions;
    beginQuiz();
}

function startAll() {
    currentBlockIdx = null;
    questions = [];
    bloques.forEach(function(bl){ questions = questions.concat(bl.questions); });
    beginQuiz();
}

function volverMenu() {
    document.getElementById('menu-screen').classList.remove('hidden');
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('results-screen').classList.add('hidden');
}

function repetirBloque() {
    if (currentBlockIdx !== null) startBlock(currentBlockIdx);
    else startAll();
}

function beginQuiz() {
    currentIdx = 0; hits = 0; fails = [];
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('results-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('cat-badge').textContent = currentBlockIdx !== null ? bloques[currentBlockIdx].nombre : 'Todas las preguntas';
    showQuestion();
}

function showQuestion() {
    var q = questions[currentIdx];
    document.getElementById('progreso-texto').textContent = 'Pregunta ' + (currentIdx+1) + '/' + questions.length;
    document.getElementById('progress-fill').style.width = ((currentIdx/questions.length)*100) + '%';
    document.getElementById('question-text').textContent = (currentIdx+1) + '. ' + q.q;
    document.getElementById('btn-next').classList.remove('show');
    var container = document.getElementById('options-container');
    container.innerHTML = '';
    q.opts.forEach(function(opt, idx) {
        var btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = LETTERS[idx] + ') ' + opt;
        btn.onclick = function(){ checkAnswer(btn, idx, q); };
        container.appendChild(btn);
    });
}

function checkAnswer(btn, selectedIdx, q) {
    var allBtns = document.querySelectorAll('.opt-btn');
    allBtns.forEach(function(b){ b.disabled = true; });
    if (selectedIdx === q.correct) {
        btn.classList.add('correct');
        hits++;
    } else {
        btn.classList.add('wrong');
        fails.push({ q: q.q, correct: LETTERS[q.correct] + ') ' + q.opts[q.correct] });
        allBtns[q.correct].classList.add('reveal');
    }
    document.getElementById('btn-next').classList.add('show');
}

function nextQuestion() {
    currentIdx++;
    if (currentIdx < questions.length) {
        showQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('results-screen').classList.remove('hidden');
    var pct = Math.round((hits/questions.length)*100);
    var scoreEl = document.getElementById('score-percent');
    scoreEl.textContent = pct + '%';
    scoreEl.style.color = pct >= 70 ? '#27ae60' : '#ff3b30';
    document.getElementById('score-text').textContent = 'Has acertado ' + hits + ' de ' + questions.length + ' · ' + (pct>=70?'¡Muy bien! ✅':'Sigue repasando 💪');
    var review = document.getElementById('failed-review');
    review.innerHTML = fails.length > 0
        ? '<strong>Tus errores:</strong><br><br>' + fails.map(function(f){
            return '<div class="result-item"><div class="rq">• '+f.q+'</div><div class="ra">✔ '+f.correct+'</div></div>';
          }).join('')
        : '🎉 ¡Sin ningún fallo! ¡Perfecto!';
}

buildMenu();
</script>
