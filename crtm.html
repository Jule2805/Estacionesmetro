<!DOCTYPE html>

    <style>
        :root {
            --bg: #121212;

            --text: #ffffff;
        }

            display: flex; 
            justify-content: center;

        }
        .container { width: 100%; max-width: 500px; padding: 20px; }

            align-items: center;
            margin-bottom: 10px;
        }
        #progreso-texto { font-size: 14px; color: #888; }

            background: none; border: 1px solid #444; color: #ccc;
            padding: 5px 12px; border-radius: 5px; cursor: pointer;
        }

        .progress-bar {
            width: 100%; height: 6px; background: #333;
            border-radius: 10px; margin-bottom: 25px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: var(--accent);
            width: 0%; transition: width 0.3s;
        }

        .question-card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cat-badge {
            display: inline-block;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 99px;
            margin-bottom: 12px;
            background: #333;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .cat-crtm       { background: #1a2a1a; color: #7de87d; }
        .cat-fundamental { background: #3a1a1a; color: #ff6b6b; }
        .cat-indicadora  { background: #1a2a3a; color: #6ab0ff; }
        .cat-cartel      { background: #2a2a1a; color: #f0c040; }
        .cat-manual      { background: #1a3a1a; color: #6fd88a; }

        h2 { font-size: 1.1rem; line-height: 1.5; margin-bottom: 20px; margin-top: 0; }

        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            background: #2a2a2a; border: 1px solid #333; color: white;
            padding: 16px; border-radius: 12px; text-align: left;
            font-size: 14px; cursor: pointer; transition: 0.2s; line-height: 1.4;
        }
        .opt-btn:hover:not(:disabled) { background: #333; border-color: #555; }
        .opt-btn.correct { background: var(--correct) !important; border-color: var(--correct); }
        .opt-btn.wrong   { background: var(--wrong)   !important; border-color: var(--wrong); }
        .opt-btn.reveal  { background: #005a28 !important; border-color: var(--correct); opacity: 0.85; }

        .tip-box {
            display: none;
            margin-top: 16px;
            padding: 14px;
            background: #252525;
            border-left: 3px solid var(--accent);
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
        }
        .tip-box.show { display: block; }

        .btn-next {
            width: 100%; background: var(--accent); color: white;
            border: none; padding: 15px; border-radius: 10px;
            font-weight: bold; margin-top: 16px; cursor: pointer;
            display: none; font-size: 15px;
        }
        .btn-next.show { display: block; }

        .results-list {
            text-align: left; background: #000; padding: 15px;
            border-radius: 10px; font-size: 13px; max-height: 300px;
            overflow-y: auto; margin-top: 15px;
        }
        .result-item { margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .hidden { display: none; }

</head>

// Mezclar preguntas al inicio
let questions = [...db].sort(() => Math.random() - 0.5);
let currentIdx = 0;
let hits = 0;
let fails = [];

function initQuiz() {
    document.getElementById('progreso-texto').innerText = `Pregunta 1/${questions.length}`;
    showQuestion();
}

function showQuestion() {
    const q = questions[currentIdx];

    document.getElementById('progreso-texto').innerText = `Pregunta ${currentIdx + 1}/${questions.length}`;
    document.getElementById('progress-fill').style.width = `${(currentIdx / questions.length) * 100}%`;
    document.getElementById('question-text').innerText = q.q;
    document.getElementById('btn-next').classList.remove('show');
    document.getElementById('tip-box').classList.remove('show');
    document.getElementById('tip-box').innerText = '';

    // Badge de categoría
    const badge = document.getElementById('cat-badge');
    badge.innerText = CAT_LABELS[q.cat] || q.cat;
    badge.className = 'cat-badge cat-' + q.cat;

    const container = document.getElementById('options-container');
    container.innerHTML = '';

    const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
    shuffled.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(btn, opt, q.a, q.tip);
        container.appendChild(btn);
    });
}

function checkAnswer(btn, selected, correct, tip) {
    const buttons = document.querySelectorAll('.opt-btn');
    buttons.forEach(b => b.disabled = true);

    const tipBox = document.getElementById('tip-box');
    tipBox.innerText = tip;
    tipBox.classList.add('show');

    if (selected === correct) {
        btn.classList.add('correct');
        hits++;
        setTimeout(nextQuestion, 1200);
    } else {
        btn.classList.add('wrong');
        fails.push({ q: questions[currentIdx].q, a: correct });
        guardarFallo(questions[currentIdx].q, questions[currentIdx].opts, correct, "CRTM: Organización y Normativa");
        buttons.forEach(b => { if (b.innerText === correct) b.classList.add('reveal'); });
        document.getElementById('btn-next').classList.add('show');
    }
}

function nextQuestion() {
    currentIdx++;
    if (currentIdx < questions.length) {
        showQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('results-screen').classList.remove('hidden');

    const percent = Math.round((hits / questions.length) * 100);
    document.getElementById('score-percent').innerText = `${percent}%`;
    document.getElementById('score-text').innerText = `Has acertado ${hits} de ${questions.length}`;

    const review = document.getElementById('failed-review');
    if (fails.length > 0) {
        review.innerHTML = '<strong>Tus errores:</strong><br><br>' +
            fails.map(f => `<div class="result-item">• ${f.q}<br><span style="color:var(--correct)">✔ ${f.a}</span></div>`).join('');
    } else {
        review.innerHTML = '¡Perfecto! No has tenido ningún fallo.';
    }
}

function guardarFallo(pregunta, opciones, respuestaCorrecta, modulo) {
    try {
        let listaFallos = JSON.parse(localStorage.getItem('mis_fallos')) || [];
        if (!listaFallos.find(f => f.q === pregunta)) {
            listaFallos.push({ id: Date.now(), modulo, q: pregunta, opts: opciones, a: respuestaCorrecta });
            localStorage.setItem('mis_fallos', JSON.stringify(listaFallos));
        }
    } catch(e) {}
}

initQuiz();
</script>
