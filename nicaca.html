  {b:5,cat:"resto",q:"El aspecto morado (foco luciendo en color morado o azul) indica:",a:"c) Autoriza el rebase de la señal e indica la existencia en la vía de una aguja de punta, curva pronunciada o cercanía de estación.",opts:["a) Autoriza el rebase con precaución en marcha a la vista por entrada a zona sin señalización.","b) Anuncio de parada por encontrarse la próxima señal con aspecto rojo","c) Autoriza el rebase de la señal e indica la existencia en la vía de una aguja de punta, curva pronunciada o cercanía de estación.","d) Parada absoluta para trenes que no circulan en modo ATO o M+ATP."],tip:"Art. 3.3.3: Morado = Autoriza el rebase e indica aguja de punta, curva pronunciada o cercanía de estación."},
  {b:5,cat:"resto",q:"Una señal repetidora es:",a:"c) Una señal informativa que repite la información de una señal automática o mandada, antes de llegar a ella, cuando no tiene suficiente distancia de visibilidad.",opts:["a) Una señal que indica parada absoluta y que no debe ser rebasada salvo con autorización del PCC.","b) Una señal informativa que indica la posición de una aguja que va a tomarse de punta.","c) Una señal informativa que repite la información de una señal automática o mandada, antes de llegar a ella, cuando no tiene suficiente distancia de visibilidad.","d) Una señal que consta de un solo foco rojo y que repite la información de una señal automática."],tip:"Art. 3.3.2: La señal repetidora repite la información de otra señal cuando la visibilidad es insuficiente."},
  {b:5,cat:"resto",q:"Las señales fijas ferroviarias en función de su ubicación se denominan:",a:"b) De estación, intermedias y de maniobra.",opts:["a) Automáticas, mandadas, repetidoras, no rebasables y de indicación de posición de agujas.","b) De estación, intermedias y de maniobra.","c) Verticales, triangulares y en 'L' invertida.","d) Horizontales, verticales y en 'L' invertida."],tip:"Art. 3.3.1: Por ubicación, las señales fijas ferroviarias son de estación, intermedias y de maniobra."},
  {b:5,cat:"resto",q:"Las señales fijas ferroviarias en relación con su funcionamiento pueden ser:",a:"a) Automáticas, mandadas, repetidoras, no rebasables y de indicación de posición de agujas.",opts:["a) Automáticas, mandadas, repetidoras, no rebasables y de indicación de posición de agujas.","b) De estación, intermedias y de maniobra.","c) Verticales, triangulares y en 'L' invertida.","d) Horizontales, verticales y en 'L' invertida."],tip:"Art. 3.3.1: Por funcionamiento son: automáticas, mandadas, repetidoras, no rebasables y de posición de agujas."},
  {b:5,cat:"resto",q:"El aspecto M-Roja (letra M luciendo en color rojo sobre fondo negro) indica:",a:"b) Parada absoluta para aquellos trenes que no circulan en el modo de conducción ATO o M+ATP.",opts:["a) Parada absoluta.","b) Parada absoluta para aquellos trenes que no circulan en el modo de conducción ATO o M+ATP.","c) Anuncio de parada próxima por estar la siguiente señal apagada.","d) Deberemos parar en la siguiente parada por estar la señal roja iluminada"],tip:"Art. 3.3.3: M-Roja = Parada absoluta solo para trenes que NO circulan en ATO o M+ATP."},
  {b:5,cat:"resto",q:"Las señales mandadas son:",a:"b) Las que además de abrir o cerrar condicionadas por la situación de los trenes, pueden ser mandadas desde el CTC o desde un mando local.",opts:["a) Las que abren o cierran condicionadas por la situación de los trenes o por el estado de la siguiente señal.","b) Las que además de abrir o cerrar condicionadas por la situación de los trenes, pueden ser mandadas desde el CTC o desde un mando local.","c) Las que abren o cierran solo al ser telemandadas automáticamente.","d) Las que abren o cierran y se identifican con la letra A y un código alfanumérico"],tip:"Art. 3.3.2: Las señales mandadas también pueden ser accionadas desde el CTC o mando local."},
  {b:5,cat:"resto",q:"¿Cómo debe actuar todo trabajador respecto a las órdenes de la señalización, salvo excepciones indicadas en la NIC o las que pueda establecer el PCC?",a:"a) Deberá obedecerlas estrictamente y de inmediato.",opts:["a) Deberá obedecerlas estrictamente y de inmediato.","b) Deberá interpretarlas y actuar según su criterio","c) Deberá obviarlas cuando sean contradictorias","d) Deberá obedecerlas salvo en determinados casos"],tip:"Art. 3.1.2: Las órdenes de señalización deben obedecerse estrictamente y de inmediato."},
  {b:5,cat:"resto",q:"Una señal repetidora se identifica con una placa en la que figura:",a:"b) La letra 'R' y el código alfanumérico de la señal de la que es repetidora.",opts:["a) Las letras 'NR' y el código alfanumérico de la señal de la que es repetidora.","b) La letra 'R' y el código alfanumérico de la señal de la que es repetidora.","c) Las letras 'SR' y el código alfanumérico de la señal de la que es repetidora.","d) Las letras 'SN' y el código alfanumérico de la señal que es repetidora."],tip:"Art. 3.3.2: La placa de la repetidora lleva la letra 'R' y el código alfanumérico de la señal original."},

  // ── BLOQUE 6: Señalización II (NIC 12) ──
  {b:6,cat:"resto",q:"¿Cómo se identifican las señales repetidoras?",a:"a) 'R' seguido de un código alfanumérico",opts:["a) 'R' seguido de un código alfanumérico","b) 'REP' seguido de un código alfanumérico","c) 'R' seguido de un código numérico","d) 'REP' seguido de un código numérico"],tip:"Art. 3.3.2: Las señales repetidoras se identifican con la letra 'R' seguida de un código alfanumérico."},
  {b:6,cat:"resto",q:"La señalización deberá ser perceptible…",a:"b) por los conductores de los trenes en el sentido de la circulación",opts:["a) por los conductores de los trenes en el sentido contrario de la circulación","b) por los conductores de los trenes en el sentido de la circulación","c) por los conductores de los trenes en ambos sentidos de la circulación","d) por los conductores de los trenes en el sentido transversal de la circulación"],tip:"Art. 3.1.1: La señalización debe ser perceptible por los conductores en el sentido de la circulación."},
  {b:6,cat:"resto",q:"En función de su ubicación, las señales fijas ferroviarias se denominan:",a:"c) de estación, intermedias y de maniobra",opts:["a) de estación","b) de estación, intermedias","c) de estación, intermedias y de maniobra","d) de estación, intermedias, de maniobra y de reversa"],tip:"Art. 3.3.1: Por ubicación, las señales fijas ferroviarias son de estación, intermedias y de maniobra."},
  {b:6,cat:"resto",q:"Todo trabajador en el cumplimiento de sus funciones, deberá obedecer estrictamente y de inmediato las órdenes de la señalización...",a:"a) salvo las excepciones indicadas en la presente NIC o las que pueda establecer el PCC en casos puntuales.",opts:["a) salvo las excepciones indicadas en la presente NIC o las que pueda establecer el PCC en casos puntuales.","b) salvo las excepciones indicadas en la presente NIC o las que pueda establecer el Jefe de Estación en casos puntuales.","c) salvo las excepciones indicadas en la presente Señal o las que pueda establecer el PCC en casos puntuales.","d) salvo las excepciones indicadas en la presente Señal o las que pueda establecer el Jefe de Estación en casos puntuales."],tip:"Art. 3.1.2: Las órdenes de la señalización se obedecen salvo excepciones de la NIC o las que establezca el PCC en casos puntuales."},
  {b:6,cat:"resto",q:"La creación, modificación (tanto de ubicación como de funcionalidad) y la supresión de señales, será puesta en conocimiento de todo el personal afectado, por:",a:"d) Por el PCC",opts:["a) La dirección","b) Solidaridad Obrera de Metro","c) El personal de mantenimiento de la estación","d) Por el PCC"],tip:"Art. 3.3.6: La creación, modificación y supresión de señales se pone en conocimiento del personal afectado por el PCC."},
  {b:6,cat:"resto",q:"¿Cómo se identifican las señales mandadas?",a:"c) 'M' seguido de un código alfanumérico",opts:["a) 'M' seguido de un código numérico","b) 'Man' seguido de un código numérico","c) 'M' seguido de un código alfanumérico","d) 'Man' seguido de un código alfanumérico"],tip:"Art. 3.3.2: Las señales mandadas se identifican con la letra 'M' seguida de un código alfanumérico."},
  {b:6,cat:"resto",q:"En relación a su funcionamiento, las señales pueden ser…",a:"c) Automáticas",opts:["a) Rojas","b) Verdes","c) Automáticas","d) Variables"],tip:"Art. 3.3.1: Por funcionamiento, entre otras, las señales pueden ser automáticas."},
  {b:6,cat:"resto",q:"El objetivo de la señalización es…",a:"c) regular la circulación de trenes con seguridad",opts:["a) regular la circulación de trenes","b) regular la circulación de trenes contra otros","c) regular la circulación de trenes con seguridad","d) regular la circulación"],tip:"Art. 3.1.1: El objetivo de la señalización es regular la circulación de trenes con seguridad."},
  {b:6,cat:"resto",q:"Según el orden de prioridad, ¿cuál de las siguientes iría en primer lugar?",a:"c) Señales gestuales de emergencia",opts:["a) Señales fijas","b) Señales Acústicas","c) Señales gestuales de emergencia","d) Señales Luminosas"],tip:"Art. 3.1.4: En primer lugar del orden de prioridad van las señales gestuales de emergencia."},
  {b:6,cat:"resto",q:"Cuando un trabajador detecte o tenga conocimiento de alguna avería o irregularidad en la señalización o en los aparatos de vía, aunque sea momentánea, deberá comunicarlo:",a:"b) de inmediato al PCC",opts:["a) de inmediato al Jefe de Estación","b) de inmediato al PCC","c) de inmediato a Solidaridad Obrera de Metro","d) de inmediato a los trenes que le siguen"],tip:"Art. 3.1.6: Las averías o irregularidades en señalización o aparatos de vía se comunican de inmediato al PCC."},
  {b:6,cat:"resto",q:"¿Cómo se identifican las señales automáticas?",a:"a) 'A' seguido de un código alfanumérico",opts:["a) 'A' seguido de un código alfanumérico","b) 'A' seguido de un código numérico","c) 'AUT' seguido de un código alfanumérico","d) 'AUT' seguido de un código numérico"],tip:"Art. 3.3.2: Las señales automáticas se identifican con la letra 'A' seguida de un código alfanumérico."},
  {b:6,cat:"resto",q:"Las señales gestuales de emergencia...",a:"b) podrán realizarse agitando ostensiblemente cualquier objeto, luminoso o no, o los brazos",opts:["a) podrán realizarse agitando ostensiblemente cualquier objeto, acústico o no, o los brazos","b) podrán realizarse agitando ostensiblemente cualquier objeto, luminoso o no, o los brazos","c) podrán realizarse agitando ostensiblemente cualquier objeto, volátil o no, o los brazos","d) podrán realizarse agitando ostensiblemente cualquier objeto, luminoso o no, o los sonidos acústicos"],tip:"Art. 3.2.1: Las señales gestuales de emergencia se realizan agitando cualquier objeto luminoso o no, o los brazos."},
  {b:6,cat:"resto",q:"¿Cuántos tipos de señal pueden encontrarse durante la circulación?",a:"b) 8",opts:["a) 7","b) 8","c) 6","d) 9"],tip:"Art. 3.1.3: Durante la circulación pueden encontrarse 8 tipos de señalización."},
  {b:6,cat:"resto",q:"Las señales semafóricas luminosas instaladas deben tener…",a:"d) uno o varios focos",opts:["a) dos o más focos","b) un foco e identificación","c) varios focos e identificación","d) uno o varios focos"],tip:"Art. 3.3.1: Las señales semafóricas luminosas deben tener uno o varios focos."},
  {b:6,cat:"resto",q:"Si fuera posible y necesario por suponer un riesgo para la circulación, ante una avería en señalización o aparato de vía, el trabajador…",a:"c) permanecerá junto a la señal o aparato averiado",opts:["a) quitará la señal","b) avisará por radio","c) permanecerá junto a la señal o aparato averiado","d) permanecerá junto a la señal luminosa"],tip:"Art. 3.1.6: Si fuera posible y necesario, el trabajador permanecerá junto a la señal o aparato averiado."},
  {b:6,cat:"resto",q:"Aspecto rojo (Foco luciendo en color rojo) indica:",a:"a) Indica parada absoluta",opts:["a) Indica parada absoluta","b) Indica parada absoluta para aquellos trenes que no circulan en el modo de conducción ATO","c) Indicación de anuncio de parada próxima por estar la siguiente señal apagada","d) Indicación de anuncio de parada próxima por estar la siguiente señal apagada o averiada"],tip:"Art. 3.3.3: El aspecto rojo indica parada absoluta."},
  {b:6,cat:"resto",q:"¿Cuál de las siguientes no es un tipo de señal de la Red de Metro?",a:"d) Señales Viales",opts:["a) Indicadores Luminosos","b) Señales Acústicas","c) Señales gestuales de emergencia","d) Señales Viales"],tip:"Art. 3.1.3: Las señales viales no son un tipo de señalización de la Red de Metro."},
  {b:6,cat:"resto",q:"¿Cuál de las siguientes formas de semáforo no existe?",a:"b) Horizontal",opts:["a) Vertical","b) Horizontal","c) Triangular","d) 'L' invertida"],tip:"Art. 3.3.1: La forma horizontal no existe entre las formas de semáforo."},
  {b:6,cat:"resto",q:"Aspecto amarillo (Foco luciendo en color amarillo) indica:",a:"a) Indica anuncio de parada por encontrarse la próxima señal con aspecto rojo.",opts:["a) Indica anuncio de parada por encontrarse la próxima señal con aspecto rojo.","b) Autoriza el rebase","c) autorizar el paso","d) Prohíbe el paso a un túnel de enlace con otra línea."],tip:"Art. 3.3.3: El aspecto amarillo indica anuncio de parada por encontrarse la próxima señal con aspecto rojo."},
  {b:6,cat:"resto",q:"Si un conductor encuentra varias señales o carteles en un mismo lugar, procederá de la forma siguiente:",a:"a) Si sus órdenes son compatibles, las obedecerá todas",opts:["a) Si sus órdenes son compatibles, las obedecerá todas","b) Si sus órdenes son compatibles, solo la prioritaria","c) Si sus órdenes son contradictorias, obedecerá la que primero vea","d) Si sus órdenes son contradictorias, obedecerá la indicación más intuitiva"],tip:"Art. 3.1.5: Con órdenes compatibles entre varias señales o carteles, se obedecen todas."},

  // ── BLOQUE 7: Conducción (NIC 13) ──
  {b:7,cat:"resto",q:"En estaciones con acceso por ambos lados del tren, en primer lugar abrirá las puertas:",a:"a) correspondientes al lateral predeterminado",opts:["a) correspondientes al lateral predeterminado","b) izquierda","c) derecha","d) ambas"],tip:"Art. 4.2.10: En estaciones con acceso por ambos lados, se abren primero las puertas correspondientes al lateral predeterminado."},
  {b:7,cat:"resto",q:"Cuando en un tren en servicio sea necesario abandonar la cabina de conducción, el conductor lo inmovilizará para impedir su movimiento, aplicando todas las medidas técnicas posibles, tales como:",a:"a) el freno de estacionamiento, poner el inversor de marcha en punto '0', etc.",opts:["a) el freno de estacionamiento, poner el inversor de marcha en punto '0', etc.","b) el freno de estacionamiento","c) poner el inversor de marcha en punto '0'","d) el freno de estacionamiento, poner el inversor de marcha en punto '1', etc."],tip:"Art. 4.2.11: Al abandonar la cabina, se aplican todas las medidas posibles: freno de estacionamiento, inversor de marcha en '0', etc."},
  {b:7,cat:"resto",q:"Para conducir cualquier tren, ya sea de viajeros o de trabajo, se deberá estar en posesión...",a:"b) La correspondiente habilitación",opts:["a) La correspondiente licencia","b) La correspondiente habilitación","c) El correspondiente carnet expedido en las instalaciones de Metro de Madrid","d) No es necesario tener nada"],tip:"Art. 4.1.1: Para conducir cualquier tren se deberá estar en posesión de la correspondiente habilitación."},
  {b:7,cat:"resto",q:"Por las vías principales en circunstancias normales de explotación queda prohibida la circulación a contravía, salvo en los siguientes casos:",a:"a) Con autorización expresa del PCC",opts:["a) Con autorización expresa del PCC","b) Con autorización expresa del Jefe de estación","c) Con autorización expresa del Superior inmediato","d) Con autorización expresa del PCC, del Jefe de Estación o del Superior inmediato"],tip:"Art. 4.2.12: La circulación a contravía en vías principales solo está permitida con autorización expresa del PCC."},
  {b:7,cat:"resto",q:"El conductor deberá abrir o autorizar la apertura de las puertas cuando el tren haya quedado total y correctamente detenido en:",a:"a) Los puntos establecidos en las estaciones",opts:["a) Los puntos establecidos en las estaciones","b) Los puntos establecidos por el PCC","c) Los puntos establecidos por el personal autorizado","d) Los puntos establecidos por el Jefe de Estación"],tip:"Art. 4.2.10: Las puertas se abren en los puntos establecidos en las estaciones."},
  {b:7,cat:"resto",q:"Antes de iniciar la marcha el conductor deberá comprobar:",a:"a) El funcionamiento de los sistemas de frenado",opts:["a) El funcionamiento de los sistemas de frenado","b) El funcionamiento de los sistemas de balanceado","c) El funcionamiento de los sistemas hidráulicos","d) El funcionamiento de los sistemas radiofónicos"],tip:"Art. 4.2.2: Antes de iniciar la marcha se debe comprobar el funcionamiento de los sistemas de frenado."},
  {b:7,cat:"resto",q:"En conducción manual y si no existe ninguna consigna de regulación ni restricciones en la vía, ajustará la velocidad del tren:",a:"a) a la máxima permitida en cada caso",opts:["a) a la máxima permitida en cada caso","b) a la adecuada al acomodo del conductor","c) a la mínima permitida en cada caso","d) a la aconsejada por el PCC"],tip:"Art. 4.2.6: Sin consignas ni restricciones, se ajustará la velocidad a la máxima permitida en cada caso."},
  {b:7,cat:"resto",q:"En vías principales con doble vía (una para cada sentido), la circulación de trenes será normalmente:",a:"b) Por la izquierda",opts:["a) Por la derecha","b) Por la izquierda","c) Dependerá de la estación","d) Por donde nos obligue el PCC"],tip:"Art. 4.2.5: En vías principales de doble vía, la circulación es normalmente por la izquierda."},
  {b:7,cat:"resto",q:"Los conductores y en su caso el personal designado para ello, verificarán que las operaciones de bajada y subida de viajeros a los trenes se realicen:",a:"a) En condiciones de seguridad",opts:["a) En condiciones de seguridad","b) En condiciones de rapidez","c) En condiciones de aglomeración","d) Como indique el propio PCC"],tip:"Art. 4.2.10: Las operaciones de subida y bajada de viajeros se verifican en condiciones de seguridad."},
  {b:7,cat:"resto",q:"Las habilitaciones para conducir podrán ser:",a:"a) generales o limitadas",opts:["a) generales o limitadas","b) Generales y limitadas","c) generales e ilimitadas","d) generales o ilimitadas"],tip:"Art. 4.1.1: Las habilitaciones para conducir podrán ser generales o limitadas."},
  {b:7,cat:"resto",q:"La dotación personal de los conductores estará compuesta al menos:",a:"a) por las llaves de acceso a la cabina",opts:["a) por las llaves de acceso a la cabina","b) por útiles de acceso al motor","c) Por el uniforme correspondiente","d) Por el manual de usuario de la cabina de mandos"],tip:"Art. 4.2.1: La dotación personal de los conductores incluye al menos las llaves de acceso a la cabina."},
  {b:7,cat:"resto",q:"El acceso, tránsito entre coches y la salida de los trenes se efectuará:",a:"a) cuando estos se encuentren completamente parados, estando terminantemente prohibido hacerlo mientras se encuentren en Movimiento.",opts:["a) cuando estos se encuentren completamente parados, estando terminantemente prohibido hacerlo mientras se encuentren en Movimiento.","b) cuando estos estén efectuando la detención","c) cuando estos se encuentren completamente parados como indica el art 25,2,1-4","d) cuando estos se encuentren completamente parados pudiendo hacerlo mientras se encuentren en Movimiento."],tip:"Art. 4.1.3: El acceso y salida de los trenes se efectúa con estos completamente parados, prohibido mientras estén en movimiento."},
  {b:7,cat:"resto",q:"Antes de abandonar la cabina de conducción, el conductor deberá informar:",a:"a) Al PCC",opts:["a) Al PCC","b) Al jefe de estación","c) Al compañero que nos precede para que el siga con el horario establecido","d) Al personal de mantenimiento para la respectiva revisión"],tip:"Art. 4.2.11: Antes de abandonar la cabina, el conductor deberá informar al PCC."},
  {b:7,cat:"resto",q:"Si en la verificación se detectara alguna deficiencia, se notificará:",a:"a) Al PCC o correspondiente responsable de estación",opts:["a) Al PCC o correspondiente responsable de estación","b) Al Jefe de Estacion","c) Al compañero que nos precede para que el siga con el horario establecido","d) Al operario de mantenimiento de la estación"],tip:"Art. 4.2.2: Si en la verificación se detecta una deficiencia, se notificará al PCC o al responsable de estación correspondiente."},
  {b:7,cat:"resto",q:"Las cabinas de los trenes, además de los elementos propios de conducción deberán disponerse los siguientes elementos de dotación:",a:"a) Linterna portátil y prenda de señalización de alta visibilidad",opts:["a) Linterna portátil y prenda de señalización de alta visibilidad","b) Linterna portátil de led","c) Prenda llamativa para poder avisar ante cualquier avería","d) Llaves para poder proceder a iniciar la marcha"],tip:"Art. 4.2.3: La dotación de los trenes incluye linterna portátil y prenda de señalización de alta visibilidad."},
  {b:7,cat:"resto",q:"En condiciones normales siempre se conducirá...",a:"a) por la cabina de cabeza del tren según el sentido de la circulación",opts:["a) por la cabina de cabeza del tren según el sentido de la circulación","b) por la cabina que encabeza el tren","c) Por el lado derecho de la vía","d) por el lado izquierdo de la vía"],tip:"Art. 4.2.4: En condiciones normales se conduce por la cabina de cabeza del tren según el sentido de la circulación."},
  {b:7,cat:"resto",q:"El trabajador habilitado para la conducción que acompañe al tren:",a:"a) deberá informar a su conductor del trazado de la línea y de las actuaciones a realizar en cumplimiento a la normativa",opts:["a) deberá informar a su conductor del trazado de la línea y de las actuaciones a realizar en cumplimiento a la normativa","b) deberá ser el mismo quien controle el tren en todo momento","c) deberá acudir al centro de mando una vez transcurridas 3 horas de práctica","d) deberá informar al PCC correspondiente de la actuación que está llevando a cabo según regula el Art. 425.3"],tip:"Art. 4.1.4: El trabajador habilitado que acompañe al tren informará a su conductor del trazado de la línea y de las actuaciones a realizar."},
  {b:7,cat:"resto",q:"Durante el desarrollo de las prácticas de conducción de trenes, el trabajador que imparta las prácticas:",a:"a) no dejará solo al practicante en la cabina de mandos",opts:["a) no dejará solo al practicante en la cabina de mandos","b) dejará solo al practicante en la cabina de mandos","c) no hay prácticas en la cabina de mandos","d) las prácticas se desarrollan en un simulador con el fin de no poner en peligro a los usuarios"],tip:"Art. 4.1.2: Durante las prácticas de conducción, no se dejará solo al practicante en la cabina de mandos."},
  {b:7,cat:"resto",q:"Los trenes en servicio de viajeros no deben detenerse fuera de los puntos designados, salvo:",a:"d) que la detención sea impuesta por la señalización, por los sistemas de protección de tren (ATP), para evitar un accidente o por indicación del PCC.",opts:["a) que la detención sea impuesta por los sistemas de protección de tren (ATP), para evitar un accidente o por indicación del PCC.","b) que la detención sea impuesta por la señalización, para evitar un accidente o por indicación del PCC.","c) que la detención sea impuesta por la señalización, los sistemas de protección de tren (ATP) o por indicación del PCC.","d) que la detención sea impuesta por la señalización, por los sistemas de protección de tren (ATP), para evitar un accidente o por indicación del PCC."],tip:"Art. 4.2.9: Los trenes pueden detenerse fuera de puntos designados si lo impone la señalización, el ATP, para evitar accidente o por indicación del PCC."},
  {b:7,cat:"resto",q:"Los trenes en servicio de viajeros deberán efectuar la detención en todas las estaciones para la subida y bajada de estos:",a:"a) independientemente del aspecto que presenten las señales.",opts:["a) independientemente del aspecto que presenten las señales.","b) independientemente del aspecto que presenten los pasajeros","c) independientemente del vagón que nos precede","d) independientemente de las señales del PCC"],tip:"Art. 4.2.8: La detención en todas las estaciones se efectúa independientemente del aspecto que presenten las señales."},

  // ── BLOQUE 8: Conducción, Vía, Señalización Mixta (Extra) ──
  {b:8,cat:"resto",q:"Indica qué es una vía de pruebas:",a:"c) Es aquella que se utiliza de forma secundaria, dotada de las condiciones técnicas para la realización de pruebas dinámicas con los trenes. Deberá estar permanentemente señalizada con las combinaciones con las vías de las mismas.",opts:["a) Vía que permite la circulación de los trenes en una u otra dirección, que permite la circulación de los trenes en una y otra dirección simultáneamente.","b) Vía que permite la circulación de los trenes en una u otra dirección, que permite la circulación de los trenes en una y otra dirección simultáneamente.","c) Es aquella que se utiliza de forma secundaria, dotada de las condiciones técnicas para la realización de pruebas dinámicas con los trenes. Deberá estar permanentemente señalizada con las combinaciones con las vías de las mismas.","d) Es el menor de los trenes en el que se encuentra Trabajando en plataforma de vía."],tip:"Una vía de pruebas es aquella utilizada de forma secundaria para pruebas dinámicas con trenes, permanentemente señalizada."},
  {b:8,cat:"resto",q:"¿Qué es una vía banalizada?",a:"d) Vía de señalización y enclavamiento, que permite la circulación de los trenes en una u otra dirección, simultáneamente.",opts:["a) Aquella que se utiliza para el transporte de materiales y el trabajo de los trenes incluidos destinados habitualmente al transporte de viajeros.","b) Son aquellos que se utilizan específicamente para el transporte de materiales, incluyendo el transporte habitualmente circular por vías secundarias.","c) Son aquellas que solo pueden usarse por vías salidas y por vías secundarias.","d) Vía de señalización y enclavamiento, que permite la circulación de los trenes en una u otra dirección, simultáneamente."],tip:"Vía banalizada: con señalización y enclavamiento que permite circular en ambos sentidos simultáneamente."},
  {b:8,cat:"resto",q:"Según la NIC, ¿qué es un saco de maniobras?",a:"b) Es la bifurcación del trazado de las dos carriles de un tren, que permite el tren circular por la bifurcación de las vías secundariamente.",opts:["a) Aquella que se utiliza para el transporte de materiales.","b) Es la bifurcación del trazado de las dos carriles de un tren, que permite el tren circular por la bifurcación de las vías secundariamente.","c) Aquella específicamente para materiales, incluyendo el transporte circular por vías secundarias.","d) Son aquellas que solo pueden usarse por vías salidas y por vías secundarias."],tip:"El saco de maniobras es la bifurcación del trazado que permite al tren circular secundariamente por las vías."},
  {b:8,cat:"resto",q:"¿A qué se refiere la definición de conducción Auto Blurt?",a:"d) Maniobra de inversión de marcha que permite al sistema ATO temporalmente el control de la circulación ATG, manteniendo el control ATO, garantizando el control de todos los sistemas del tren.",opts:["a) Es uno de los modos de conducción que permite un tren en un sentido.","b) Conducción de marcha adelante del tren en un sentido, con conductor en la cabina del tren.","c) Maniobra de conducción de marcha, para garantizar la circulación de la vía y el enclavamiento de vía.","d) Maniobra de inversión de marcha que permite al sistema ATO temporalmente el control de la circulación ATG, manteniendo el control ATO, garantizando el control de todos los sistemas del tren."],tip:"Auto Blurt: maniobra de inversión de marcha donde el ATO temporalmente controla la circulación ATG."},
  {b:8,cat:"resto",q:"¿Qué es el Control de Tráfico Centralizado (CTC)? (según NIC_PROFE)",a:"b) Es parte de las áreas que supervisan la explotación de la línea a través del Puesto de control central (PCC)",opts:["a) Es parte de las áreas que supervisan la explotación de la línea a través del Puesto de control central (PCC)","b) Es parte de las áreas que supervisan la explotación de la línea a través del Puesto de control central (PCC)","c) Es un sistema electromagnético de seguridad que supervisa permanentemente el estado de los enclavamientos de señales.","d) Es un departamento de Metro que se encarga del control del tráfico de trenes de cada una de las líneas."],tip:"El CTC supervisa la explotación de la línea a través del PCC."},
  {b:8,cat:"resto",q:"Según la NIC, ¿qué es un encadenamiento de señales?",a:"c) Sistema de bloqueo por respecto, que protege la circulación de trenes ante la presencia de un tren que no garantiza el correcto shuntado de la vía.",opts:["a) Sistema que garantiza la actualización de la señalización de la línea y el tratamiento de los enclavamientos de señales.","b) Sistema electromagnético de seguridad que supervisa permanentemente el estado de la vía, señales, agujas y otros elementos.","c) Sistema de bloqueo por respecto, que protege la circulación de trenes ante la presencia de un tren que no garantiza el correcto shuntado de la vía.","d) Sistema que avanza las señales y la circulación y la señalización del personal de circulación ATG."],tip:"El encadenamiento de señales es el sistema de bloqueo que protege la circulación cuando no se garantiza el correcto shuntado."},
  {b:8,cat:"resto",q:"¿Qué es un circuito de vía según la NIC?",a:"d) Método tramo en que se divide la vía, controlado por los señales, para la detección de trenes cuando circula por él el equipo.",opts:["a) Tren de vía compatible con uno o varios tramos, compatible con un sentido.","b) Tren de vía compatible con uno o varias tramas, compatible con el enclavamiento adecuado a la línea por la que se circula.","c) Tren de vía solo actúa cuando los enclavamientos solo pueden producirse en todos los casos.","d) Método tramo en que se divide la vía, controlado por los señales, para la detección de trenes cuando circula por él el equipo."],tip:"El circuito de vía es el tramo en que se divide la vía para detectar la presencia de trenes mediante señales."},
  {b:8,cat:"resto",q:"Según la NIC art. 1.1.1, ¿cuál es el objeto de la Normativa Interna de Circulación de Metro de Madrid?",a:"b) Es un conjunto de normas necesarias para regular la circulación de manera eficaz y segura tanto por la vía principal del Metro como por sus instalaciones, como para el personal al frente.",opts:["a) Se establecen las normas necesarias para que el conductor de Metro pueda regular la circulación de acuerdo con los tramos internos de tiempo entre trenes.","b) Es un conjunto de normas necesarias para regular la circulación de manera eficaz y segura tanto por la vía principal del Metro como por sus instalaciones, como para el personal al frente.","c) Es un manual de obligado cumplimiento para todos los trabajadores de Metro de Madrid.","d) Es una normativa interna de obligado cumplimiento para el personal de conducción y mantenimiento de los trenes de Metro de Madrid."],tip:"Art. 1.1.1: La NIC regula la circulación de manera eficaz y segura en la red de Metro de Madrid."},
  {b:8,cat:"resto",q:"Según la NIC, ¿qué es la circulación a contravía?",a:"d) Marcha adelante de un tren en un sentido contrario al cuadrado integrado, a la vía que que circula con conductor en la cabina del tren.",opts:["a) Marcha adelante del tren en sentido contrario al encadenamiento integrado al origen convencional de las líneas establecidas.","b) Marcha adelante del tren en sentido convencional al encadenamiento integrado al origen convencional de las líneas establecidas.","c) Marcha adelante del tren en sentido contrario al cuadrado integrado a la vía que coordina el origen convencional de las líneas establecidas.","d) Marcha adelante de un tren en un sentido contrario al cuadrado integrado, a la vía que que circula con conductor en la cabina del tren."],tip:"La circulación a contravía es la marcha en sentido contrario al habitual, con conductor en cabina."},
  {b:8,cat:"resto",q:"Según la NIC, ¿qué significa la definición de vía banalizada? (T1-T2)",a:"d) Vía de señalización y enclavamiento, que permite la circulación de los trenes en una u otra dirección, simultáneamente.",opts:["a) La vía de secundario, desde los lados laterales del origen del origen del tren establecida.","b) La vía de secundaria que los trenes coordinan el origen convencional de las líneas establecidas.","c) La vía de señalización que los trenes pueden acceder a la vía que circula en una sola vía.","d) Vía de señalización y enclavamiento, que permite la circulación de los trenes en una u otra dirección, simultáneamente."],tip:"Vía banalizada = señalización y enclavamiento que permite circular en ambos sentidos indistintamente."}
];

// ════════════════════════════════════════════
//  CONFIGURACIÓN DE BLOQUES
// ════════════════════════════════════════════
var bloquesDef = [
  {num:1, nombre:"Bloque 1 — Andén, Áreas y Sistemas",  subtema:"17 preguntas"},
  {num:2, nombre:"Bloque 2 — CTC, Zonas y Períodos",    subtema:"7 preguntas"},
  {num:3, nombre:"Bloque 3 — Plataforma de Vía y Pílón",subtema:"9 preguntas"},
  {num:4, nombre:"Bloque 4 — Documento de Programación, CTC y Depósito", subtema:"NIC 4 · 10 preguntas"},
  {num:5, nombre:"Bloque 5 — Hombre Muerto, Frenos y Equipos",          subtema:"NIC 5 · 10 preguntas"},
  {num:6, nombre:"Bloque 6 — Interestación, Pendiente y Marchas",       subtema:"NIC 6 · 10 preguntas"},
  {num:7, nombre:"Bloque 7 — Plataforma de Vía y Piñón",                subtema:"NIC 7 · 10 preguntas"},
  {num:8, nombre:"Bloque 8 — Plataforma de Vía en Recintos",            subtema:"NIC 8 · 5 preguntas"}
];
var bloquesResto = [
  {num:4, nombre:"Bloque 4 — Obligaciones y PCC",      subtema:"NIC 10 · 23 preguntas"},
  {num:5, nombre:"Bloque 5 — Señales y Carteles",      subtema:"NIC 11 · 17 preguntas"},
  {num:6, nombre:"Bloque 6 — Señalización II",         subtema:"NIC 12 · 20 preguntas"},
  {num:7, nombre:"Bloque 7 — Conducción",              subtema:"NIC 13 · 20 preguntas"},
  {num:8, nombre:"Bloque 8 — Conducción y Vía (Extra)", subtema:"10 preguntas"}
];

// ════════════════════════════════════════════
//  ESTADO
// ════════════════════════════════════════════
var currentBlock = null;
var questions = [];
var currentIdx = 0;
var hits = 0;
var fails = [];
var currentCat = "def";

// ════════════════════════════════════════════
//  BUILD MENU
// ════════════════════════════════════════════
function buildMenu() {
  buildGrid('grid-def', bloquesDef, dbDef, true);
  buildGrid('grid-resto', bloquesResto, dbResto, false);
}

function buildGrid(gridId, bloques, db, isDef) {
  var grid = document.getElementById(gridId);
  grid.innerHTML = '';
  bloques.forEach(function(bl) {
    var count = db.filter(function(q){ return q.b === bl.num; }).length;
    var btn = document.createElement('button');
    btn.className = 'menu-btn';
    btn.innerHTML = '<div><div class="label">' + bl.nombre + '</div><div class="meta">' + bl.subtema + '</div></div><span class="arrow">›</span>';
    btn.onclick = (function(n, d){ return function(){ startBlock(n, d); }; })(bl.num, db);
    grid.appendChild(btn);
  });
  // Botón "Todas"
  var btnAll = document.createElement('button');
  var total = db.reduce(function(acc){ return acc; }, db).length;
  btnAll.className = 'menu-btn ' + (isDef ? 'menu-btn-all' : 'menu-btn-all-resto');
  btnAll.innerHTML = '<div><div class="label">🔀 Todas las preguntas</div><div class="meta">' + total + ' preguntas mezcladas</div></div><span class="arrow">›</span>';
  btnAll.onclick = (function(d){ return function(){ startAll(d); }; })(db);
  grid.appendChild(btnAll);
}

// ════════════════════════════════════════════
//  QUIZ CONTROL
// ════════════════════════════════════════════
function startBlock(num, db) {
  currentBlock = num;
  currentCat = db[0] ? db[0].cat : 'def';
  questions = db.filter(function(q){ return q.b === num; }).sort(function(){ return Math.random()-.5; });
  beginQuiz();
}

function startAll(db) {
  currentBlock = null;
  currentCat = db[0] ? db[0].cat : 'def';
  questions = db.slice().sort(function(){ return Math.random()-.5; });
  beginQuiz();
}

function volverMenu() {
  document.getElementById('menu-screen').classList.remove('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('results-screen').classList.add('hidden');
}

function repetirBloque() {
  if (currentBlock !== null) {
    var db = currentCat === 'def' ? dbDef : dbResto;
    startBlock(currentBlock, db);
  } else {
    var db = currentCat === 'def' ? dbDef : dbResto;
    startAll(db);
  }
}

function beginQuiz() {
  currentIdx = 0; hits = 0; fails = [];
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  // badge color
  var badge = document.getElementById('cat-badge');
  if (currentCat === 'def') {
    badge.className = 'cat-badge def'; badge.textContent = 'Definiciones';
  } else {
    badge.className = 'cat-badge resto'; badge.textContent = 'Normativa NIC';
  }
  showQuestion();
}

function showQuestion() {
  var q = questions[currentIdx];
  document.getElementById('progreso-texto').textContent = 'Pregunta ' + (currentIdx+1) + '/' + questions.length;
  document.getElementById('progress-fill').style.width = ((currentIdx/questions.length)*100) + '%';
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('btn-next').classList.remove('show');
  var tipBox = document.getElementById('tip-box');
  tipBox.classList.remove('show'); tipBox.textContent = '';
  var container = document.getElementById('options-container');
  container.innerHTML = '';
  q.opts.slice().sort(function(){ return Math.random()-.5; }).forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'opt-btn'; btn.textContent = opt;
    btn.onclick = (function(b,o){ return function(){ checkAnswer(b,o,q.a,q.tip||''); }; })(btn,opt);
    container.appendChild(btn);
  });
}

function checkAnswer(btn, selected, correct, tip) {
  document.querySelectorAll('.opt-btn').forEach(function(b){ b.disabled=true; });
  if (tip) { var tb=document.getElementById('tip-box'); tb.textContent=tip; tb.classList.add('show'); }
  if (selected === correct) {
    btn.classList.add('correct'); hits++;
  } else {
    btn.classList.add('wrong');
    fails.push({q:questions[currentIdx].q, a:correct});
    guardarFallo(questions[currentIdx].q, questions[currentIdx].opts, correct, 'NIC: '+currentCat);
    document.querySelectorAll('.opt-btn').forEach(function(b){ if(b.textContent===correct) b.classList.add('reveal'); });
  }
  document.getElementById('btn-next').classList.add('show');
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx < questions.length) showQuestion();
  else showResults();
}

function showResults() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('results-screen').classList.remove('hidden');
  var pct = Math.round((hits/questions.length)*100);
  var scoreEl = document.getElementById('score-percent');
  scoreEl.textContent = pct + '%';
  scoreEl.style.color = pct >= 70 ? '#27ae60' : '#ff3b30';
  document.getElementById('score-text').textContent = 'Has acertado ' + hits + ' de ' + questions.length + ' · ' + (pct>=70?'¡Muy bien! ✅':'Sigue repasando 💪');
  var review = document.getElementById('failed-review');
  review.innerHTML = fails.length > 0
    ? '<strong>Tus errores:</strong><br><br>' + fails.map(function(f){ return '<div class="result-item">• '+f.q+'<br><span style="color:#27ae60">✔ '+f.a+'</span></div>'; }).join('')
    : '🎉 ¡Sin ningún fallo! ¡Perfecto!';
}

function guardarFallo(pregunta, opciones, respuestaCorrecta, modulo) {
  try {
    var lista = JSON.parse(localStorage.getItem('mis_fallos')) || [];
    if (!lista.find(function(f){ return f.q===pregunta; })) {
      lista.push({id:Date.now(), modulo:modulo, q:pregunta, opts:opciones, a:respuestaCorrecta});
      localStorage.setItem('mis_fallos', JSON.stringify(lista));
    }
  } catch(e){}
}

buildMenu();
</script>
</body>
</html>
