<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIC - Definiciones</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #27ae60;
            --correct: #009543;
            --wrong: #ff3b30;
            --text: #ffffff;
            --muted: #888;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; padding: 20px; }

        /* ── MENÚ ── */
        .menu-header { text-align: center; margin: 10px 0 25px; }
        .menu-header h1 { font-size: 22px; margin-bottom: 5px; }
        .menu-header p { color: var(--muted); font-size: 13px; }

        .btn-volver-menu {
            background: none; border: 1px solid #444; color: #ccc;
            padding: 6px 14px; border-radius: 8px; cursor: pointer;
            font-size: 13px; margin-bottom: 18px; display: block;
        }
        .btn-volver-menu:hover { border-color: #888; color: #fff; }

        .bloques-grid { display: flex; flex-direction: column; gap: 14px; }

        .bloque-btn {
            padding: 22px 18px; border-radius: 16px; cursor: pointer;
            border: none; color: #fff; font-weight: 700; font-size: 16px;
            display: flex; align-items: center; gap: 14px; text-align: left;
            transition: filter 0.2s, transform 0.1s;
        }
        .bloque-btn:hover  { filter: brightness(1.12); }
        .bloque-btn:active { transform: scale(0.98); }
        .bloque-btn .icon  { font-size: 26px; }
        .bloque-btn .info  { flex: 1; }
        .bloque-btn .info small { display: block; font-weight: 400; font-size: 12px; opacity: 0.8; margin-top: 3px; }
        .bloque-btn .count { background: rgba(0,0,0,.3); border-radius: 10px; padding: 3px 10px; font-size: 13px; }

        .btn-a      { background: #1a6b3c; }
        .btn-b      { background: #1a4f8c; }
        .btn-c      { background: #7a3080; }
        .btn-fallos { background: #8c2a1a; }

        /* ── QUIZ ── */
        .quiz-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px;
        }
        #progreso-texto { font-size: 14px; color: var(--muted); }
        .btn-salir {
            background: none; border: 1px solid #444; color: #ccc;
            padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 13px;
        }
        .progress-bar {
            width: 100%; height: 6px; background: #333;
            border-radius: 10px; margin-bottom: 25px; overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

        .question-card {
            background: var(--card); padding: 25px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,.5);
        }
        h2 { font-size: 1.05rem; line-height: 1.5; margin-bottom: 20px; min-height: 50px; }

        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            background: #2a2a2a; border: 1px solid #333; color: white;
            padding: 14px 16px; border-radius: 12px; text-align: left;
            font-size: 14px; cursor: pointer; transition: 0.2s; line-height: 1.4;
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #2f2f2f; }
        .opt-btn.correct { background: var(--correct) !important; border-color: var(--correct); }
        .opt-btn.wrong   { background: var(--wrong)   !important; border-color: var(--wrong); }

        .btn-next {
            width: 100%; background: var(--accent); color: white;
            border: none; padding: 15px; border-radius: 10px;
            font-weight: bold; margin-top: 20px; cursor: pointer;
            display: none; font-size: 15px; transition: filter 0.2s;
        }
        .btn-next:hover { filter: brightness(1.1); }

        /* ── RESULTADOS ── */
        .results-list {
            text-align: left; background: #000; padding: 15px;
            border-radius: 10px; font-size: 13px; max-height: 320px;
            overflow-y: auto; margin-top: 15px;
        }
        .result-item { margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 8px; }

        /* ── FALLOS ── */
        .fallo-item {
            background: #1e1e1e; border-left: 3px solid #e67e22;
            border-radius: 10px; padding: 14px; margin-bottom: 12px;
        }
        .fallo-modulo { font-size: 11px; color: #e67e22; text-transform: uppercase; margin-bottom: 5px; }
        .fallo-q { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .fallo-a { font-size: 13px; color: #6effa8; }
        .fallo-a-label { font-size: 11px; color: var(--muted); }

        .btn-clear {
            width: 100%; padding: 13px; background: #5a1a0a; border: none;
            border-radius: 10px; color: #fff; font-weight: 700; cursor: pointer;
            margin-top: 10px; font-size: 14px;
        }
        .btn-clear:hover { filter: brightness(1.2); }

        .empty-msg { color: var(--muted); text-align: center; margin-top: 40px; font-size: 14px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="container">

    <!-- ════════════ MENÚ ════════════ -->
    <div id="screen-menu">
        <div class="menu-header">
            <h1>📖 Definiciones</h1>
            <p>Selecciona un bloque de estudio</p>
        </div>
        <button class="btn-volver-menu" onclick="window.location.href='nic.html'">← Volver al menú NIC</button>
        <div class="bloques-grid">
            <button class="bloque-btn btn-a" onclick="startBloque('A')">
                <span class="icon">🟢</span>
                <div class="info">Bloque A<small>Acantonamiento · Andén · Bloqueo · Cantón · Gálibo…</small></div>
                <span class="count" id="cnt-A">—</span>
            </button>
            <button class="bloque-btn btn-b" onclick="startBloque('B')">
                <span class="icon">🔵</span>
                <div class="info">Bloque B<small>Marcha a la vista · PCC · Señal · ATP · Aguja…</small></div>
                <span class="count" id="cnt-B">—</span>
            </button>
            <button class="bloque-btn btn-c" onclick="startBloque('C')">
                <span class="icon">🟣</span>
                <div class="info">Bloque C<small>Shuntado · Vía banalizada · Hombre muerto · Radio…</small></div>
                <span class="count" id="cnt-C">—</span>
            </button>
            <button class="bloque-btn btn-fallos" onclick="showFallos()">
                <span class="icon">❌</span>
                <div class="info">Mis Fallos<small>Repasa las preguntas que fallaste</small></div>
                <span class="count" id="cnt-fallos">0</span>
            </button>
        </div>
    </div>

    <!-- ════════════ QUIZ ════════════ -->
    <div id="screen-quiz" class="hidden">
        <div class="quiz-header">
            <div id="progreso-texto">Pregunta 1/30</div>
            <button class="btn-salir" onclick="goMenu()">✕ Salir</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="question-card">
            <h2 id="question-text">Cargando…</h2>
            <div id="options-container" class="options-grid"></div>
            <button id="btn-next" class="btn-next" onclick="nextQuestion()">SIGUIENTE PREGUNTA ›</button>
        </div>
    </div>

    <!-- ════════════ RESULTADOS ════════════ -->
    <div id="screen-results" class="hidden">
        <div class="question-card" style="text-align:center;">
            <p style="color:var(--muted);font-size:14px;margin-bottom:4px">Resultado</p>
            <h1 id="score-percent" style="font-size:54px;margin:6px 0"></h1>
            <p id="score-text" style="color:var(--muted);font-size:14px;margin-bottom:4px"></p>
            <div id="failed-review" class="results-list"></div>
            <button class="btn-next" style="display:block;margin-top:16px" onclick="retryBloque()">🔄 REPETIR BLOQUE</button>
            <button class="btn-next" style="display:block;margin-top:10px;background:#333" onclick="goMenu()">🏠 MENÚ</button>
        </div>
    </div>

    <!-- ════════════ FALLOS ════════════ -->
    <div id="screen-fallos" class="hidden">
        <div class="menu-header">
            <h1>❌ Mis Fallos</h1>
            <p>Preguntas que fallaste anteriormente</p>
        </div>
        <button class="btn-volver-menu" onclick="goMenu()">← Volver al menú</button>
        <div id="fallos-wrap"></div>
        <button class="btn-clear" id="btn-clear" onclick="clearFallos()">🗑 Borrar todos los fallos</button>
    </div>

</div>
<script>
// ════════════════════════════════════════════════
//  BANCO DE PREGUNTAS — extraídas de NIC 1-8
// ════════════════════════════════════════════════

    { q:"¿Dónde permanece el alumbrado del túnel encendido permanentemente?",
      a:"En los sacos de maniobras",
      opts:["En toda la red principal","En las estaciones con andenes centrales","En los sacos de maniobras","En los depósitos y naves de cocheras"] },

    { q:"¿Qué es el andén?",

      opts:["Zona de espera para personal de mantenimiento","Superficie de la estación destinada al acceso de los viajeros a los trenes y su salida de estos","La zona de vías entre dos estaciones","Espacio para el estacionamiento de trenes de reserva"] },

    { q:"¿Qué define a los Aparatos de vía?",
      a:"Dispositivos que permiten la ramificación y el cruce de vías",
      opts:["Sistemas de megafonía y teleindicadores","Dispositivos que permiten la ramificación y el cruce de vías","Cajas de señales ubicadas en el túnel","Elementos de tracción de la catenaria"] },

    { q:"¿Qué es el Auto-shunt?",
      a:"Maniobra que permite a un tren circular por un tramo de vía sin necesidad de señales externas",
      opts:["Sistema de frenado automático de emergencia","Maniobra que permite a un tren circular por un tramo de vía sin necesidad de señales externas","Proceso de carga de baterías en depósito","Desacoplo automático de unidades"] },

    { q:"¿Qué es un Bloqueo?",
      a:"Sistema o conjunto de normas que tiene por objeto evitar la colisión entre trenes que circulan por la misma vía",

    { q:"¿Cómo se define un Cantón?",

    { q:"¿Qué es la Capacidad de una línea?",
      a:"El número máximo de trenes que pueden circular por ella en un tiempo determinado",
      opts:["El número máximo de viajeros por vagón","La potencia eléctrica máxima de la subestación","El número máximo de trenes que pueden circular por ella en un tiempo determinado","La longitud total de la línea en kilómetros"] },

    { q:"¿Qué es la Catenaria?",
      a:"Línea aérea de contacto destinada a suministrar energía eléctrica a los trenes",

    { q:"¿Cómo se define la Circulación?",
      a:"Movimiento de los trenes por las vías de la red",

    { q:"¿Qué es la Conducción manual?",

    { q:"¿Qué es la Conducción automática (ATO)?",

      opts:["Vía por donde pasan más trenes","Vía destinada a movimientos que no son de transporte de viajeros","Vía de acceso a las oficinas","Vía con wifi para el personal"] },

  B: [

    { q:"¿Qué tamaño tiene la franja de borde del andén (Zona A)?",

    { q:"¿Qué sistema protege la circulación ante la presencia de un tren que no garantiza el correcto shuntado?",

    { q:"En las estaciones con andén central, ¿cuántas franjas de borde de andén hay?",

    { q:"¿Cómo se llama el sistema que permite la circulación de los trenes cuando hay presencia de un tren que no garantiza el correcto funcionamiento del circuito de vía?",

      opts:["Acantonamiento","Blumado","Auto-Blunt","Franco de Emergencia"] },

    // NIC 3 — Trabajos en vía

      opts:["Equipo exclusivamente del departamento de mantenimiento que gestiona horarios","Equipo que coordina y programa, integrado por personal delegado de diferentes departamentos, cuya finalidad es la coordinación y programación de los trabajos y la gestión de las interferencias","Función automática del CTC para programar circulaciones","Sistema informático de gestión de incidencias"] },

    { q:"¿Qué es el Corte?",

    { q:"¿Qué es el Área de Seguridad?",

// ════════════════════════════════════════════════
//  ESTADO
// ════════════════════════════════════════════════
let currentBloque = null;
let questions      = [];
let currentIdx     = 0;
let hits           = 0;
let fails          = [];

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function updateBadges() {
  document.getElementById('cnt-A').textContent = BLOQUES.A.length;
  document.getElementById('cnt-B').textContent = BLOQUES.B.length;
  document.getElementById('cnt-C').textContent = BLOQUES.C.length;
  const f = JSON.parse(localStorage.getItem('mis_fallos')) || [];
  const def = f.filter(x => x.modulo && x.modulo.startsWith('NIC-DEF'));
  document.getElementById('cnt-fallos').textContent = def.length;
}

// ════════════════════════════════════════════════
//  NAVEGACIÓN
// ════════════════════════════════════════════════
function goMenu() {
  hide('screen-quiz'); hide('screen-results'); hide('screen-fallos');
  show('screen-menu');
  updateBadges();
}

function startBloque(bloque) {
  currentBloque = bloque;
  questions = shuffle(BLOQUES[bloque]);
  currentIdx = 0; hits = 0; fails = [];
  hide('screen-menu');
  show('screen-quiz');
  showQuestion();
}

function retryBloque() {
  hide('screen-results');
  startBloque(currentBloque);
}

// ════════════════════════════════════════════════
//  QUIZ
// ════════════════════════════════════════════════
function showQuestion() {
  const q     = questions[currentIdx];
  const total = questions.length;

  document.getElementById('progreso-texto').textContent =
    `Bloque ${currentBloque} · Pregunta ${currentIdx + 1}/${total}`;
  document.getElementById('progress-fill').style.width =
    `${(currentIdx / total) * 100}%`;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('btn-next').style.display = 'none';

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  shuffle(q.opts).forEach(opt => {
    const btn = document.createElement('button');
    btn.className  = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(btn, opt, q);
    container.appendChild(btn);
  });
}

function checkAnswer(btn, selected, q) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

  if (selected === q.a) {
    btn.classList.add('correct');
    hits++;
    setTimeout(nextQuestion, 700);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b => {
      if (b.textContent === q.a) b.classList.add('correct');
    });
    fails.push({ q: q.q, a: q.a });
    guardarFallo(q.q, q.opts, q.a, `NIC-DEF-${currentBloque}`);
    document.getElementById('btn-next').style.display = 'block';
  }
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx < questions.length) {
    showQuestion();
  } else {
    showResults();
  }
}

// ════════════════════════════════════════════════
//  RESULTADOS
// ════════════════════════════════════════════════
function showResults() {
  hide('screen-quiz');
  show('screen-results');

  const total   = questions.length;
  const percent = Math.round((hits / total) * 100);
  const pass    = percent >= 70;

  document.getElementById('score-percent').textContent = `${percent}%`;
  document.getElementById('score-percent').style.color = pass ? '#27ae60' : '#ff3b30';
  document.getElementById('score-text').textContent =
    `Has acertado ${hits} de ${total} · ${pass ? '¡Muy bien! ✅' : 'Sigue repasando 💪'}`;

  const review = document.getElementById('failed-review');
  if (fails.length === 0) {
    review.innerHTML = '<span style="color:#6effa8">🎉 ¡Sin errores! ¡Perfecto!</span>';
    return;
  }
  review.innerHTML = '<strong>Repasa tus errores:</strong><br><br>' +
    fails.map(f =>
      `<div class="result-item">• ${f.q}<br>
       <span style="color:#6effa8">✔ ${f.a}</span></div>`
    ).join('');
}

// ════════════════════════════════════════════════
//  FALLOS
// ════════════════════════════════════════════════
function showFallos() {
  hide('screen-menu');
  show('screen-fallos');

  const all  = JSON.parse(localStorage.getItem('mis_fallos')) || [];
  const def  = all.filter(x => x.modulo && x.modulo.startsWith('NIC-DEF'));
  const wrap = document.getElementById('fallos-wrap');
  const btn  = document.getElementById('btn-clear');

  if (def.length === 0) {
    wrap.innerHTML = '<p class="empty-msg">🎉 ¡No tienes fallos guardados!</p>';
    btn.style.display = 'none';
    return;
  }
  btn.style.display = 'block';
  wrap.innerHTML = def.map(f => `
    <div class="fallo-item">
      <div class="fallo-modulo">${f.modulo}</div>
      <div class="fallo-q">${f.q}</div>
      <div class="fallo-a-label">Respuesta correcta:</div>
      <div class="fallo-a">${f.a}</div>
    </div>`).join('');
}

function clearFallos() {
  if (!confirm('¿Borrar todos los fallos de Definiciones?')) return;
  const all    = JSON.parse(localStorage.getItem('mis_fallos')) || [];
  const remain = all.filter(x => !(x.modulo && x.modulo.startsWith('NIC-DEF')));
  localStorage.setItem('mis_fallos', JSON.stringify(remain));
  showFallos();
  updateBadges();
}

// ════════════════════════════════════════════════
//  GUARDAR FALLO (compatible con el sistema global)
// ════════════════════════════════════════════════
function guardarFallo(pregunta, opciones, respuestaCorrecta, modulo) {
  let lista = JSON.parse(localStorage.getItem('mis_fallos')) || [];
  if (!lista.find(f => f.q === pregunta)) {
    lista.push({ id: Date.now(), modulo, q: pregunta, opts: opciones, a: respuestaCorrecta });
    localStorage.setItem('mis_fallos', JSON.stringify(lista));
  }
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
updateBadges();
</script>
