        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-test { background: #2a2a2a; border: 1px solid #444; color: white; padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-test:hover { border-color: var(--accent); background: #333; }
        .btn-test b { display: block; font-size: 20px; }
        .hidden { display: none; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; color: #aaa; }
        .question { font-size: 18px; font-weight: bold; margin-bottom: 20px; min-height: 60px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .opt { background: #333; border: 1px solid #444; color: white; padding: 15px; border-radius: 12px; cursor: pointer; text-align: left; transition: 0.2s; font-size: 15px; width: 100%; }
        .correct { background: var(--correct) !important; border-color: var(--correct); }
        .wrong { background: var(--wrong) !important; border-color: var(--wrong); }
        #next-btn { width: 100%; padding: 15px; margin-top: 20px; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; display: none; }
        .back-btn { background: none; border: none; color: #888; cursor: pointer; margin-bottom: 15px; align-self: flex-start; font-size: 14px; }
    </style>
</head>

    <button class="back-btn" id="btn-volver-menu" onclick="location.href='detodo.html'">← Volver a Normativa</button>

        { q: "El toque de silbato del tren indica:", opts: ["Llegada a la estación", "Inminente cierre de puertas y prohibición de entrada/salida", "Avería técnica", "Salida inmediata"], a: "Inminente cierre de puertas y prohibición de entrada/salida" },
        { q: "¿Qué trenes deben figurar con su horario de paso individual?", opts: ["Los nocturnos", "Solo los exprés", "Primer y último tren del día", "Los de mantenimiento"], a: "Primer y último tren del día" },
        { q: "La información sobre red e itinerarios debe permitir:", opts: ["Descuentos", "Horarios bus", "Comprar online", "Conocimiento suficiente del conjunto de la red"], a: "Conocimiento suficiente del conjunto de la red" },
        { q: "No dan derecho a devolución los títulos que permitan:", opts: ["Ida y vuelta", "Varias zonas", "Número ilimitado de viajes o libre circulación", "Transbordos"], a: "Número ilimitado de viajes o libre circulación" },
        { q: "¿Qué definen los Cuadros Horarios de Servicio?", opts: ["Plantillas", "Normas internas", "Intervalos y horarios de paso de trenes", "Tarifas"], a: "Intervalos y horarios de paso de trenes" },
        { q: "¿Desde qué intervalo deben reflejarse horarios en laborables?", opts: ["Desde 10 minutos", "Desde 5 minutos", "Desde 15 minutos", "A partir de 7 minutos y 30 segundos"], a: "A partir de 7 minutos y 30 segundos" },
        { q: "La devolución debe solicitarse:", opts: ["Estación de destino", "En la estación, inmediatamente tras la anomalía", "En 24 horas", "Cualquier estación"], a: "En la estación, inmediatamente tras la anomalía" },
        { q: "Otra condición para exponer horarios en accesos es que estén a más de:", opts: ["40 m en planta", "25 m en planta", "50 m en planta", "100 m en planta"], a: "50 m en planta" },
        { q: "Tienen preferencia de paso:", opts: ["Viajeros con abono", "Los que salen de los trenes", "Los que entran al tren", "Personas con equipaje"], a: "Los que salen de los trenes" },
        { q: "¿Qué intervalo da derecho a devolución si el previsto era < 7 min 30 s?", opts: ["12 min", "Más de 15 min", "10 min", "Más de 20 min"], a: "Más de 15 min" },
        { q: "En las circunstancias señaladas en el artículo 13, el viajero recibirá un título equivalente al utilizado que permita:", opts: ["Un viaje de mayor recorrido", "Un viaje de cualquier tipo", "Un viaje igual al interrumpido", "Dos viajes sencillos"], a: "Un viaje igual al interrumpido" },
        { q: "Alternativamente, el viajero puede optar (según art. 14) por:", opts: ["Recibir en metálico el importe del viaje no finalizado", "Un vale descuento", "Un título con viajes ilimitados", "Un abono mensual"], a: "Recibir en metálico el importe del viaje no finalizado" },
        { q: "Para ejercer el derecho a devolución, el viajero que renuncie a continuar el viaje debe presentar un título de transporte cuya devolución esté prevista en:", opts: ["El plano de la red", "El Cuadro de Tarifas", "El Cuadro Horario", "El Reglamento de Viajeros"], a: "El Cuadro de Tarifas" },
        { q: "¿Qué deben distinguir los Cuadros Horarios?", opts: ["Períodos del día y días de la semana", "Tipos de tren", "Velocidad", "Conductores"], a: "Períodos del día y días de la semana" },
        { q: "La nota que acredita la circunstancia del artículo 12 debe solicitarse:", opts: ["Inmediatamente después de la anomalía", "Antes del viaje", "Al día siguiente", "Tras presentar la reclamación"], a: "Inmediatamente después de la anomalía" },
        { q: "El Cuadro de Tarifas completo se expondrá en:", opts: ["Solo andenes", "Vestíbulos y andenes", "Taquillas", "Solo vestíbulos"], a: "Vestíbulos y andenes" },
        { q: "También se expondrá en accesos cuyos vestíbulos tengan más de:", opts: ["30 metros de longitud", "Más de dos tramos de escaleras de profundidad", "Un tramo de escaleras", "Tres ascensores"], a: "Más de dos tramos de escaleras de profundidad" },
        { q: "El horario de apertura y cierre se expondrá en:", opts: ["Solo andenes", "Trenes", "Cabinas", "Vestíbulos de todas las estaciones"], a: "Vestíbulos de todas las estaciones" },
        { q: "Cuando se prevean retrasos superiores a los del art. 12, se informa por:", opts: ["Personal estación", "SMS", "Pantallas", "Megafonía"], a: "Megafonía" }
    ]
};

let currentBlock = [], currentIdx = 0, hits = 0, mistakes = [];

function startTest(num) {
    currentBlock = db[num];
    currentIdx = 0; hits = 0; mistakes = [];
    document.getElementById('selector').classList.add('hidden');
    document.getElementById('quiz-area').classList.remove('hidden');
    document.getElementById('btn-volver-menu').classList.add('hidden');
    document.getElementById('btn-salir-test').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    const q = currentBlock[currentIdx];
    document.getElementById('progreso').innerText = `Pregunta ${currentIdx + 1}/${currentBlock.length}`;
    document.getElementById('score').innerText = hits;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('next-btn').style.display = 'none';
    const container = document.getElementById('q-options');
    container.innerHTML = '';
    q.opts.forEach(optText => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.innerText = optText;
        btn.onclick = () => check(btn, optText, q.a);
        container.appendChild(btn);
    });
}

function check(btn, selected, correct) {
    const buttons = document.querySelectorAll('.opt');
    buttons.forEach(b => b.disabled = true);
    
    const qActual = currentBlock[currentIdx]; // Obtenemos la pregunta actual

    if(selected === correct) {
        btn.classList.add('correct');
        hits++;
        setTimeout(nextQuestion, 600);
    } else {
        btn.classList.add('wrong');
        
        // --- AQUÍ CONECTAMOS CON EL CENTRO DE ERRORES ---
        guardarFallo(
            qActual.q,        // La pregunta
            qActual.opts,     // Las opciones
            correct,          // La respuesta correcta
            "Ley CRTM"        // La etiqueta del tema
        );
        // -----------------------------------------------

        mistakes.push({q: qActual.q, a: correct});
        buttons.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        document.getElementById('next-btn').style.display = 'block';
    }
}

function nextQuestion() {
    currentIdx++;
    if(currentIdx < currentBlock.length) showQuestion();
    else showResults();
}

function showResults() {
    document.getElementById('quiz-area').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    const pct = Math.round((hits/currentBlock.length)*100);
    document.getElementById('final-score').innerText = `${pct}% (${hits}/${currentBlock.length})`;
    const list = document.getElementById('failed-list');
    if(mistakes.length > 0) {
        list.innerHTML = '<strong>Repasa tus errores:</strong><br><br>' + 
            mistakes.map(m => `• ${m.q}<br><span style="color:var(--correct)">✔ Correcta: ${m.a}</span>`).join('<br><br>');
    } else { list.innerHTML = '¡Enhorabuena! Has clavado todas las preguntas.'; }
}
function guardarFallo(pregunta, opciones, respuestaCorrecta, modulo) {
    // 1. Recuperamos lo que ya hay guardado o creamos una lista vacía
    let listaFallos = JSON.parse(localStorage.getItem('mis_fallos')) || [];

    // 2. Creamos el objeto del fallo
    const nuevoFallo = {
        id: Date.now(), // Para que cada fallo sea único
        modulo: modulo, // Ej: "Ley CRTM" o "Tarifas"
        q: pregunta,
        opts: opciones,
        a: respuestaCorrecta
    };

    // 3. Solo lo añadimos si no estaba ya repetido
    if (!listaFallos.find(f => f.q === pregunta)) {
        listaFallos.push(nuevoFallo);
        localStorage.setItem('mis_fallos', JSON.stringify(listaFallos));
    }
}
