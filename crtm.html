<!DOCTYPE html>

<head>

        :root {

        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }

        .menu-title { text-align: center; margin-bottom: 6px; font-size: 1.3rem; font-weight: 700; }
        .menu-subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
        .menu-grid { display: flex; flex-direction: column; gap: 12px; }
        .menu-btn {
            background: var(--card); border: 1px solid #333; color: var(--text);
            padding: 18px 20px; border-radius: 14px; text-align: left;
            cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .menu-btn:hover { background: #2a2a2a; border-color: var(--accent); }
        .menu-btn .label { font-size: 15px; font-weight: 600; }
        .menu-btn .meta { font-size: 12px; color: #888; margin-top: 3px; }
        .menu-btn .arrow { color: var(--accent); font-size: 20px; }
        .menu-btn-all { background: var(--accent); border-color: var(--accent); margin-top: 6px; }
        .menu-btn-all:hover { opacity: 0.9; }

        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #progreso-texto { font-size: 14px; color: #888; }
        .btn-salir { background: none; border: 1px solid #444; color: #ccc; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .progress-bar { width: 100%; height: 6px; background: #333; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        .question-card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .cat-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 99px; margin-bottom: 12px; background: #1a2a1a; color: #7de87d; text-transform: uppercase; letter-spacing: 0.06em; }
        h2 { font-size: 1.1rem; line-height: 1.5; margin-bottom: 20px; margin-top: 0; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn { background: #2a2a2a; border: 1px solid #333; color: white; padding: 16px; border-radius: 12px; text-align: left; font-size: 14px; cursor: pointer; transition: 0.2s; line-height: 1.4; }
        .opt-btn:hover:not(:disabled) { background: #333; border-color: #555; }
        .opt-btn.correct { background: var(--correct) !important; border-color: var(--correct); }
        .opt-btn.wrong { background: var(--wrong) !important; border-color: var(--wrong); }
        .opt-btn.reveal { background: #005a28 !important; border-color: var(--correct); opacity: 0.85; }
        .tip-box { display: none; margin-top: 16px; padding: 14px; background: #252525; border-left: 3px solid var(--accent); border-radius: 8px; font-size: 13px; line-height: 1.6; color: #ccc; }
        .tip-box.show { display: block; }
        .btn-next { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 16px; cursor: pointer; display: none; font-size: 15px; }
        .btn-next.show { display: block; }
        .results-list { text-align: left; background: #000; padding: 15px; border-radius: 10px; font-size: 13px; max-height: 300px; overflow-y: auto; margin-top: 15px; }
        .result-item { margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .hidden { display: none; }
    </style>
</head>

var BLOCK_SIZE = 30;
var bloques = [];
var totalQ = db.length;
for (var i = 0; i < totalQ; i += BLOCK_SIZE) {
    bloques.push(db.slice(i, i + BLOCK_SIZE));
}

var currentBlock = null;
var questions = [];
var currentIdx = 0;
var hits = 0;
var fails = [];

function buildMenu() {
    var grid = document.getElementById('menu-grid');
    grid.innerHTML = '';
    bloques.forEach(function(bloque, i) {
        var desde = i * BLOCK_SIZE + 1;
        var hasta = Math.min((i + 1) * BLOCK_SIZE, totalQ);
        var btn = document.createElement('button');
        btn.className = 'menu-btn';
        btn.innerHTML =
            '<div>' +
            '<div class="label">Bloque ' + (i+1) + '</div>' +
            '<div class="meta">Preguntas ' + desde + ' &ndash; ' + hasta + ' &nbsp;&middot;&nbsp; ' + bloque.length + ' preguntas</div>' +
            '</div>' +
            '<span class="arrow">&#x203A;</span>';
        btn.onclick = (function(idx){ return function(){ startBlock(idx); }; })(i);
        grid.appendChild(btn);
    });
    var btnAll = document.createElement('button');
    btnAll.className = 'menu-btn menu-btn-all';
    btnAll.innerHTML =
        '<div>' +
        '<div class="label">&#x1F500; Todas las preguntas</div>' +
        '<div class="meta">' + totalQ + ' preguntas mezcladas</div>' +
        '</div>' +
        '<span class="arrow">&#x203A;</span>';
    btnAll.onclick = startAll;
    grid.appendChild(btnAll);
}

function startBlock(idx) {
    currentBlock = idx;
    questions = bloques[idx].slice().sort(function(){ return Math.random() - 0.5; });
    beginQuiz();
}

function startAll() {
    currentBlock = null;
    questions = db.slice().sort(function(){ return Math.random() - 0.5; });
    beginQuiz();
}

function volverMenu() {
    document.getElementById('menu-screen').classList.remove('hidden');
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('results-screen').classList.add('hidden');
}

function repetirBloque() {
    if (currentBlock !== null) startBlock(currentBlock);
    else startAll();
}

function beginQuiz() {
    currentIdx = 0; hits = 0; fails = [];
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('results-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    var q = questions[currentIdx];
    document.getElementById('progreso-texto').innerText = 'Pregunta ' + (currentIdx+1) + '/' + questions.length;
    document.getElementById('progress-fill').style.width = ((currentIdx / questions.length) * 100) + '%';
    document.getElementById('question-text').innerText = q.q;
    document.getElementById('btn-next').classList.remove('show');
    var tipBox = document.getElementById('tip-box');
    tipBox.classList.remove('show');
    tipBox.innerText = '';

    var container = document.getElementById('options-container');
    container.innerHTML = '';
    var shuffled = q.opts.slice().sort(function(){ return Math.random() - 0.5; });
    shuffled.forEach(function(opt) {
        var btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = (function(b, o){ return function(){ checkAnswer(b, o, q.a, q.tip); }; })(btn, opt);
        container.appendChild(btn);
    });
}

function checkAnswer(btn, selected, correct, tip) {
    document.querySelectorAll('.opt-btn').forEach(function(b){ b.disabled = true; });
    var tipBox = document.getElementById('tip-box');
    tipBox.innerText = tip;
    tipBox.classList.add('show');

    if (selected === correct) {
        btn.classList.add('correct');
        hits++;
    } else {
        btn.classList.add('wrong');
        fails.push({ q: questions[currentIdx].q, a: correct });
        guardarFallo(questions[currentIdx].q, questions[currentIdx].opts, correct, 'CRTM');
        document.querySelectorAll('.opt-btn').forEach(function(b){
            if (b.innerText === correct) b.classList.add('reveal');
        });
    }
    document.getElementById('btn-next').classList.add('show');
}

function nextQuestion() {
    currentIdx++;
    if (currentIdx < questions.length) showQuestion();
    else showResults();
}

function showResults() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('results-screen').classList.remove('hidden');
    var percent = Math.round((hits / questions.length) * 100);
    document.getElementById('score-percent').innerText = percent + '%';
    document.getElementById('score-text').innerText = 'Has acertado ' + hits + ' de ' + questions.length;
    var review = document.getElementById('failed-review');
    if (fails.length > 0) {
        review.innerHTML = '<strong>Tus errores:</strong><br><br>' +
            fails.map(function(f){
                return '<div class="result-item">&bull; ' + f.q + '<br><span style="color:var(--correct)">&#x2714; ' + f.a + '</span></div>';
            }).join('');
    } else {
        review.innerHTML = '&#x1F389; Sin ningún fallo. ¡Perfecto!';
    }
}

function guardarFallo(pregunta, opciones, respuestaCorrecta, modulo) {
    try {
        var lista = JSON.parse(localStorage.getItem('mis_fallos')) || [];
        if (!lista.find(function(f){ return f.q === pregunta; })) {
            lista.push({ id: Date.now(), modulo: modulo, q: pregunta, opts: opciones, a: respuestaCorrecta });
            localStorage.setItem('mis_fallos', JSON.stringify(lista));
        }
    } catch(e) {}
}

buildMenu();
