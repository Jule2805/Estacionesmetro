let currentBlock = [], currentIdx = 0, hits = 0, mistakes = [];

function startTest(num) {
    if(!db[num]) { alert("Bloque no disponible"); return; }
    currentBlock = db[num];
    currentIdx = 0; hits = 0; mistakes = [];
    document.getElementById('selector').classList.add('hidden');
    document.getElementById('quiz-area').classList.remove('hidden');
    document.getElementById('btn-volver-menu').classList.add('hidden');
    document.getElementById('btn-salir-test').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    const q = currentBlock[currentIdx];
    document.getElementById('progreso').innerText = `Pregunta ${currentIdx + 1}/${currentBlock.length}`;
    document.getElementById('score').innerText = hits;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('next-btn').style.display = 'none';
    const container = document.getElementById('q-options');
    container.innerHTML = '';
    
    q.opts.forEach(optText => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.innerText = optText;
        btn.onclick = () => check(btn, optText, q.a);
        container.appendChild(btn);
    });
}

function check(btn, selected, correct) {
    const buttons = document.querySelectorAll('.opt');
    buttons.forEach(b => b.disabled = true);
    
    const qActual = currentBlock[currentIdx]; // Obtenemos la pregunta actual

    if(selected === correct) {
        btn.classList.add('correct');
        hits++;
        setTimeout(nextQuestion, 600);
    } else {
        btn.classList.add('wrong');
        
        // --- AQUÍ CONECTAMOS CON EL CENTRO DE ERRORES ---
        guardarFallo(
            qActual.q,        // La pregunta
            qActual.opts,     // Las opciones
            correct,          // La respuesta correcta
            "Ley CRTM"        // La etiqueta del tema
        );
        // -----------------------------------------------

        mistakes.push({q: qActual.q, a: correct});
        buttons.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        document.getElementById('next-btn').style.display = 'block';
    }
}
function nextQuestion() {
    currentIdx++;
    if(currentIdx < currentBlock.length) showQuestion();
    else showResults();
}

function showResults() {
    document.getElementById('quiz-area').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    const pct = Math.round((hits/currentBlock.length)*100);
    document.getElementById('final-score').innerText = `${pct}% (${hits}/${currentBlock.length})`;
    const list = document.getElementById('failed-list');
    
    if(mistakes.length > 0) {
        list.innerHTML = '<strong>Repasa tus errores:</strong><br><br>' + 
            mistakes.map(m => `• ${m.q}<br><span style="color:var(--correct)">✔ Correcta: ${m.a}</span>`).join('<br><br>');
    } else { 
        list.innerHTML = '¡Enhorabuena! Has clavado todas las preguntas de la Ley.'; 
    }
}
function guardarFallo(pregunta, opciones, respuestaCorrecta, modulo) {
    // 1. Recuperamos lo que ya hay guardado o creamos una lista vacía
    let listaFallos = JSON.parse(localStorage.getItem('mis_fallos')) || [];

    // 2. Creamos el objeto del fallo
    const nuevoFallo = {
        id: Date.now(), // Para que cada fallo sea único
        modulo: modulo, // Ej: "Ley CRTM" o "Tarifas"
        q: pregunta,
        opts: opciones,
        a: respuestaCorrecta
    };

    // 3. Solo lo añadimos si no estaba ya repetido
    if (!listaFallos.find(f => f.q === pregunta)) {
        listaFallos.push(nuevoFallo);
        localStorage.setItem('mis_fallos', JSON.stringify(listaFallos));
    }
}
