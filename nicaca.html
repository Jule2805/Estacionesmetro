<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIC - Definiciones</title>
    <style>
        :root { --bg:#121212; --card:#1e1e1e; --accent:#27ae60; --correct:#009543; --wrong:#ff3b30; --text:#ffffff; --muted:#888; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; min-height:100vh; }
        .container { width:100%; max-width:500px; padding:20px; }

        /* ── MENÚ ── */
        .menu-title { text-align:center; font-size:1.3rem; font-weight:700; margin-bottom:4px; margin-top:8px; }
        .menu-subtitle { text-align:center; color:var(--muted); font-size:13px; margin-bottom:18px; }
        .btn-salir { background:none; border:1px solid #444; color:#ccc; padding:5px 12px; border-radius:5px; cursor:pointer; font-size:13px; margin-bottom:18px; display:inline-block; }
        .btn-salir:hover { border-color:#888; color:#fff; }

        /* Separador de sección */
        .section-sep {
            display:flex; align-items:center; gap:10px;
            margin:18px 0 12px;
        }
        .section-sep span {
            font-size:11px; font-weight:700; text-transform:uppercase;
            letter-spacing:.08em; white-space:nowrap; padding:3px 10px;
            border-radius:99px;
        }
        .section-sep.def span { background:#1a3a1a; color:#7de87d; }
        .section-sep.resto span { background:#1a2a3a; color:#7db8e8; }
        .section-sep::after { content:''; flex:1; height:1px; background:#2a2a2a; }

        .menu-grid { display:flex; flex-direction:column; gap:10px; }
        .menu-btn {
            background:var(--card); border:1px solid #333; color:var(--text);
            padding:16px 18px; border-radius:14px; text-align:left;
            cursor:pointer; transition:0.2s; display:flex;
            justify-content:space-between; align-items:center;
        }
        .menu-btn:hover { background:#2a2a2a; border-color:var(--accent); }
        .menu-btn .label { font-size:15px; font-weight:600; }
        .menu-btn .meta { font-size:12px; color:var(--muted); margin-top:3px; }
        .menu-btn .arrow { color:var(--accent); font-size:20px; flex-shrink:0; margin-left:10px; }
        .menu-btn-all { background:var(--accent); border-color:var(--accent); margin-top:6px; }
        .menu-btn-all:hover { opacity:.9; }
        .menu-btn-all-resto { background:#1a4a7a; border-color:#1a4a7a; margin-top:6px; }
        .menu-btn-all-resto:hover { opacity:.9; }

        /* ── QUIZ ── */
        .quiz-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        #progreso-texto { font-size:14px; color:var(--muted); }
        .progress-bar { width:100%; height:6px; background:#333; border-radius:10px; margin-bottom:22px; overflow:hidden; }
        .progress-fill { height:100%; background:var(--accent); width:0%; transition:width .3s; }
        .question-card { background:var(--card); padding:24px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.5); }
        .cat-badge { display:inline-block; font-size:11px; padding:3px 10px; border-radius:99px; margin-bottom:12px; text-transform:uppercase; letter-spacing:.06em; }
        .cat-badge.def  { background:#1a3a1a; color:#7de87d; }
        .cat-badge.resto { background:#1a2a3a; color:#7db8e8; }
        h2 { font-size:1rem; line-height:1.55; margin-bottom:18px; margin-top:0; }
        .options-grid { display:flex; flex-direction:column; gap:10px; }
        .opt-btn { background:#2a2a2a; border:1px solid #333; color:white; padding:13px 14px; border-radius:12px; text-align:left; font-size:13px; cursor:pointer; transition:0.18s; line-height:1.4; }
        .opt-btn:hover:not(:disabled) { background:#333; border-color:#555; }
        .opt-btn.correct { background:var(--correct) !important; border-color:var(--correct); }
        .opt-btn.wrong   { background:var(--wrong)   !important; border-color:var(--wrong); }
        .opt-btn.reveal  { background:#005a28 !important; border-color:var(--correct); opacity:.85; }
        .tip-box { display:none; margin-top:14px; padding:13px; background:#252525; border-left:3px solid var(--accent); border-radius:8px; font-size:13px; line-height:1.6; color:#ccc; }
        .tip-box.show { display:block; }
        .btn-next { width:100%; background:var(--accent); color:white; border:none; padding:14px; border-radius:10px; font-weight:bold; margin-top:14px; cursor:pointer; display:none; font-size:15px; }
        .btn-next.show { display:block; }

        /* ── RESULTADOS ── */
        .results-list { text-align:left; background:#000; padding:15px; border-radius:10px; font-size:13px; max-height:300px; overflow-y:auto; margin-top:14px; }
        .result-item { margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:5px; }
        .hidden { display:none; }
    </style>
</head>
<body>
<div class="container">

    <!-- ════════ MENÚ ════════ -->
    <div id="menu-screen">
        <div class="menu-title">📋 Test NIC</div>
        <div class="menu-subtitle">Elige un bloque de estudio</div>
        <button class="btn-salir" onclick="window.location.href='academia.html'">← Volver al menú NIC</button>

        <!-- SECCIÓN DEFINICIONES -->
        <div class="section-sep def"><span>📖 Definiciones</span></div>
        <div class="menu-grid" id="grid-def"></div>

        <!-- SECCIÓN RESTO -->
        <div class="section-sep resto"><span>📚 Resto NIC</span></div>
        <div class="menu-grid" id="grid-resto"></div>
    </div>

    <!-- ════════ QUIZ ════════ -->
    <div id="quiz-screen" class="hidden">
        <div class="quiz-header">
            <div id="progreso-texto">Pregunta 1/30</div>
            <button class="btn-salir" onclick="volverMenu()">✕ Salir</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="question-card">
            <div id="cat-badge" class="cat-badge def">Definiciones</div>
            <h2 id="question-text">Cargando...</h2>
            <div id="options-container" class="options-grid"></div>
            <div id="tip-box" class="tip-box"></div>
            <button id="btn-next" class="btn-next" onclick="nextQuestion()">SIGUIENTE →</button>
        </div>
    </div>

    <!-- ════════ RESULTADOS ════════ -->
    <div id="results-screen" class="hidden">
        <div class="question-card" style="text-align:center;">
            <h1 id="score-percent" style="font-size:52px;margin:10px 0">0%</h1>
            <p id="score-text" style="color:var(--muted);font-size:14px;margin-bottom:4px"></p>
            <div id="failed-review" class="results-list"></div>
            <button class="btn-next show" onclick="repetirBloque()">🔄 REPETIR BLOQUE</button>
            <button class="btn-next show" style="background:#444;margin-top:10px;" onclick="volverMenu()">🏠 ELEGIR OTRO BLOQUE</button>
        </div>
    </div>

</div>
<script>
// ════════════════════════════════════════════
//  DB — DEFINICIONES (bloques 1-3, cat:"def")
// ════════════════════════════════════════════
var dbDef = [
  // ── BLOQUE 1: Andén, Áreas, Sistemas ──
  {b:1,cat:"def",q:"¿Qué comprende la Franja de la zona A (franja del andén de aproximadamente 80 cm)?",a:"d) El comienzo de la banda azul existente en el andén, hasta el borde del mismo que delimita el inicio de la plataforma de vía.",opts:["a) El comienzo de la banda azul existente en el andén, hasta el fondo del mismo que delimita el final de la plataforma de vía.","b) El comienzo de la banda azul del mismo que delimita el final de la plataforma de vía.","c) El comienzo de la banda azul existente en el andén, hasta el borde del mismo que delimita el inicio de la plataforma de vía.","d) El comienzo de la banda azul existente en el andén, hasta el borde del mismo que delimita el inicio de la plataforma de vía."],tip:"La Franja de la zona A comprende desde el inicio de la banda azul hasta el borde del andén que delimita el inicio de la plataforma de vía."},
  {b:1,cat:"def",q:"¿Qué medios definen los límites del andén?",a:"c) Los pílones de entrada y salida.",opts:["a) Los pílones de entrada.","b) Los pílones de salida.","c) Los pílones de entrada y salida.","d) Los pílones centrales de vía."],tip:"Los límites del andén quedan definidos por los pílones de entrada y salida."},
  {b:1,cat:"def",q:"A efectos de la NIC, se denomina 'Franja del andén'. ¿Qué norma describe estas zonas?",a:"a) Zona A — Franja de borde de andén; Zona 1 — Es todo el andén excluyendo la Zona A.",opts:["a) Zona A — Franja de borde de andén; Zona 1 — Es todo el andén excluyendo la Zona A.","b) Zona 1 — Franja de borde de andén; Zona 1 — Es todo el andén excluyendo la Zona 1.","c) Zona 1 — Franja de borde de andén; Zona 2 — Es todo el andén incluyendo la Zona A.","d) Zona 1 — Franja de borde de andén; Zona 1 — Es todo el andén incluyendo la Zona 1."],tip:"La normativa distingue: Zona A (franja de ~80 cm junto al borde) y Zona 1 (el resto del andén)."},
  {b:1,cat:"def",q:"¿Qué tamaño tiene la Franja de borde del andén (Zona A)?",a:"d) 80 cm",opts:["a) 35 cm","b) 50 cm","c) 70 cm","d) 80 cm"],tip:"La franja de borde del andén (Zona A) tiene una anchura de 80 cm."},
  {b:1,cat:"def",q:"¿Qué sistema protege la circulación cuando un tren ocupa la vía sin garantizar el correcto shuntado?",a:"b) Acantonamiento",opts:["a) Bloqueo automático","b) Acantonamiento","c) CPC","d) Auto-Blunt"],tip:"El Acantonamiento protege la circulación cuando un tren no garantiza el correcto shuntado del circuito de vía."},
  {b:1,cat:"def",q:"¿Cómo se denomina la zona a cada lado del área de trabajo que protege al personal en plataforma?",a:"d) Área de Seguridad",opts:["a) Área Real","b) Área de trabajo","c) Área PCP","d) Área de Seguridad"],tip:"El Área de Seguridad es la zona a cada lado del área de trabajo que garantiza la seguridad del personal frente a circulaciones."},
  {b:1,cat:"def",q:"En los andenes centrales, ¿cuántas franjas de borde de andén existen?",a:"a) Dos franjas de borde de andén, una por cada lado.",opts:["a) Dos franjas de borde de andén, una por cada lado.","b) Cuatro franjas de borde de andén, dos por cada lado.","c) Dos franjas de borde de andén, dos por cada lado.","d) Ocho franjas de borde de andén, dos por cada lado."],tip:"En andenes centrales (entre dos vías) existen dos franjas de borde, una a cada lado."},
  {b:1,cat:"def",q:"¿Cómo se conoce la zona de la estación a lo largo de la vía, de anchura variable, que facilita el acceso a los trenes?",a:"a) Andén",opts:["a) Andén","b) Vestíbulo","c) Túnel","d) Pasillo de intercambio"],tip:"El Andén es la zona de la estación de anchura variable y desnivel adecuado para el acceso a los trenes."},
  {b:1,cat:"def",q:"¿Qué es el modo Blurt?",a:"d) Modo de moverse del tren, que se realiza en el proceso de evaluación ATG, cumpliéndose en cualquier línea de clase nominal del Metro.",opts:["a) Mecanismo de movimiento de marcha, nunca en modo ATG, siempre en las dos vías de modo nominal máximas.","b) Modo de moverse del tren en el proceso de evaluación ATG, en cualquier línea de forma automática.","c) Mecanismo de moverse del tren en el proceso de evaluación ATG en cualquier vía con dos modos automáticos.","d) Modo de moverse del tren, que se realiza en el proceso de evaluación ATG, cumpliéndose en cualquier línea de clase nominal del Metro."],tip:"El modo Blurt es el modo de movimiento del tren durante el proceso de evaluación ATG, aplicable en cualquier línea nominal."},
  {b:1,cat:"def",q:"¿Cómo se conoce la inversión de marcha ATG automática en cualquier modo de conducción?",a:"a) Auto-Blurt",opts:["a) Auto-Blurt","b) Acantonamiento","c) Autónomo","d) Remesa"],tip:"El Auto-Blurt es la inversión de marcha automática en modo ATG."},
  {b:1,cat:"def",q:"¿Cómo se denominan los límites a partir del cual el conductor puede acceder manualmente a la estación de línea?",a:"a) Frente Filares",opts:["a) Frente Filares","b) Frente Central","c) Frente Dragón","d) Sistema de forma Portátil de Vehículo (S.A.P.V)"],tip:"El Frente Filares es el límite a partir del cual el conductor puede acceder manualmente a la estación de línea."},
  {b:1,cat:"def",q:"¿Cuáles de estos es el frente identificado y normalizado, con marcas puntuales?",a:"d) Frente de estacionamiento",opts:["a) Frente de emergencia","b) Frente Neurológico","c) Frente de Apoyo","d) Frente de estacionamiento"],tip:"El Frente de estacionamiento es el tipo de frente normalizado con marcas puntuales para el estacionamiento del tren."},

  // ── BLOQUE 2: CTC, Zonas, Períodos ──
  {b:2,cat:"def",q:"¿Cómo se conoce el sistema que permite la visualización de la línea y el tratamiento de incidencias de Metro?",a:"a) Control de Tráfico Centralizado (CTC)",opts:["a) Control de Tráfico Centralizado (CTC)","b) Control de Tráfico Descentralizado (CTD)","c) Control de Tráfico Normalizado (CTN)","d) Control de los Descentralizados (CAD)"],tip:"El CTC (Control de Tráfico Centralizado) permite la visualización y gestión de la línea y las incidencias."},
  {b:2,cat:"def",q:"¿Qué es el Control de Tráfico Centralizado (CTC)?",a:"d) El Sistema que posibilita la actualización de la línea y el destino de la línea y el tratamiento de las incidencias.",opts:["a) El Sistema que permite la actualización de la línea y la puesta de la línea.","b) El Sistema que posibilita la actualización de la línea y el control de señales.","c) El Sistema que posibilita la actualización de la línea y las incidencias de control.","d) El Sistema que posibilita la actualización de la línea y el destino de la línea y el tratamiento de las incidencias."],tip:"El CTC posibilita la actualización del estado de la línea y el tratamiento centralizado de todas las incidencias."},
  {b:2,cat:"def",q:"¿Cómo se denomina el lugar donde se almacenan, reparan, limpian y restablecen los trenes?",a:"a) Depósito / Cocheras",opts:["a) Depósito / Cocheras","b) Almacén / Parking","c) Parking / Parking","d) Depósito / Parking"],tip:"El Depósito/Cocheras es el lugar de estacionamiento y mantenimiento de trenes fuera del servicio en línea."},
  {b:2,cat:"def",q:"¿Cuál es la definición correcta de 'Marcha a la vista'?",a:"a) Conducción manual del tren, que permite al conductor avanzar a una velocidad tal que le permita detenerse en cualquier punto. Puede ser a velocidad reducida desde la estación de origen o desde otro punto.",opts:["a) Conducción manual del tren, que permite al conductor avanzar a una velocidad tal que le permita detenerse en cualquier punto. Puede ser a velocidad reducida desde la estación de origen o desde otro punto.","b) Conducción automática del tren, que permite al conductor avanzar a velocidad regulada por el sistema ATG.","c) Conducción manual del tren con las responsabilidades del conductor según la guía de maniobra.","d) Conducción automática del tren que no permite al conductor conducir desde la estación sin detener el tren."],tip:"La Marcha a la Vista es la conducción manual a velocidad reducida que garantiza poder detenerse ante cualquier obstáculo."},
  {b:2,cat:"def",q:"¿Cuál es la definición correcta de 'Período Fuera de Servicio'?",a:"d) El período comprendido desde la finalización del período de servicio hasta el inicio del período de servicio siguiente, normalmente utilizado para la realización de trabajos nocturnos.",opts:["a) El período comprendido desde la instalación del servicio hasta el inicio del período siguiente.","b) El período comprendido desde la finalización del servicio hasta el inicio del siguiente, utilizado para la finalización del servicio.","c) El período comprendido desde la finalización del servicio hasta el inicio del siguiente, utilizado para trabajos diurnos.","d) El período comprendido desde la finalización del período de servicio hasta el inicio del período de servicio siguiente, normalmente utilizado para la realización de trabajos nocturnos."],tip:"El Período Fuera de Servicio va desde el fin de un servicio hasta el inicio del siguiente, aprovechado para trabajos nocturnos."},
  {b:2,cat:"def",q:"¿Cuál es la definición correcta de 'rampa'?",a:"d) Plano inclinado de la vía en sentido descendente.",opts:["a) Plano horizontal de la vía en sentido ascendente.","b) Plano plano de la vía en sentido ascendente.","c) Plano plano de la vía en sentido descendente.","d) Plano inclinado de la vía en sentido descendente."],tip:"La rampa es el plano inclinado de la vía en sentido descendente, por oposición a la pendiente ascendente."},
  {b:2,cat:"def",q:"¿Cómo se conoce el período comprendido desde la apertura del servicio hasta la apertura del servicio del día siguiente?",a:"a) Período de servicio",opts:["a) Período de servicio","b) Período Basuro","c) Período técnico","d) Período Cantones"],tip:"El Período de servicio es el tiempo desde la apertura hasta el cierre del servicio de cada día."},

  // ── BLOQUE 3: Plataforma de vía, Pílón ──
  {b:3,cat:"def",q:"¿Cuál es la definición correcta de 'Plataformas de vía'?",a:"b) Es la estructura de una estación con todas sus vías, andenes, calzones, etc.",opts:["a) Es la estructura donde se asientan las vías.","b) Es la estructura de una estación con todas sus vías, andenes, calzones, etc.","c) Es la estructura desde donde se asientan los trenes.","d) Es la estructura por la que circulan los reposos."],tip:"La Plataforma de vía es la estructura de la estación que incluye vías, andenes y demás elementos de la infraestructura."},
  {b:3,cat:"def",q:"¿Cómo se conoce el punto donde finaliza el andén y comienza la Información?",a:"b) Pílón",opts:["a) Fila","b) Pílón","c) Alveados","d) Normal"],tip:"El Pílón es el punto exacto donde finaliza el andén y comienza la zona de información."},
  {b:3,cat:"def",q:"¿Cómo se conoce el período comprendido desde la finalización del período de servicio hasta el inicio del siguiente, normalmente utilizado para trabajos nocturnos?",a:"a) Período fuera de servicio",opts:["a) Período fuera de servicio","b) Período de servicio","c) Período de descanso","d) Período técnico"],tip:"El Período Fuera de Servicio es el tiempo entre el fin de un servicio y el inicio del siguiente, para mantenimiento nocturno."},
  {b:3,cat:"def",q:"¿Cuál es la definición correcta de 'Pílón'?",a:"d) Es el punto donde finaliza el andén y comienza la información. En las estaciones donde hay una puerta que obstaculiza el paso a la información, se considera pílón a este punto.",opts:["a) Es el punto donde inicia el andén y finaliza la información.","b) Es el punto donde finaliza el andén y comienza la información, sin puertas.","c) Es el punto donde finaliza el andén y finaliza la información.","d) Es el punto donde finaliza el andén y comienza la información. En las estaciones donde hay una puerta que obstaculiza el paso a la información, se considera pílón a este punto."],tip:"El Pílón es donde finaliza el andén y comienza la información. Si hay puerta, ese punto con la puerta es el pílón."},
  {b:3,cat:"def",q:"La plataforma de vía, ¿será de aplicación en el interior de las naves de depósitos y cocheras?",a:"a) Verdadero — No se aplica",opts:["a) Verdadero — No se aplica","b) Falso — Sí se aplica"],tip:"Verdadero. El concepto de plataforma de vía NO se aplica en el interior de las naves de depósitos y cocheras."},
  {b:3,cat:"def",q:"¿Qué zona tendrá consideración de plataforma de vía cuando el acceso al túnel está delimitado por un cerramiento (vallas, separadores, etc.)?",a:"a) La zona de túnel hasta dicho cerramiento.",opts:["a) La zona de túnel hasta dicho cerramiento.","b) La zona de túnel completa.","c) Si está delimitado por cerramiento, no se considera plataforma de vía.","d) La zona de túnel anterior al cerramiento hasta la estación siguiente."],tip:"Con cerramiento, solo tiene consideración de plataforma de vía la zona hasta dicho cerramiento."},
  {b:3,cat:"def",q:"¿Qué comprende la plataforma de vía en las estaciones?",a:"c) La zona comprendida entre los andenes o entre el andén y el paramento lateral de la estación.",opts:["a) Únicamente la zona comprendida entre los andenes.","b) Únicamente la zona entre el andén y el paramento lateral.","c) La zona comprendida entre los andenes o entre el andén y el paramento lateral de la estación.","d) Una zona ampliada en 8 metros desde los carriles exteriores."],tip:"En estaciones, la plataforma de vía comprende entre andenes, o entre el andén y el paramento lateral."},
  {b:3,cat:"def",q:"¿Cómo está comprendida la plataforma de vía en los tramos a cielo abierto?",a:"d) Por una zona que abarca a todas las vías, ampliada en 3 metros desde los carriles exteriores, salvo que haya elemento separador.",opts:["a) Ampliada en 1 metro desde los carriles exteriores.","b) Ampliada en 6 metros desde los carriles exteriores.","c) Ampliada en 5 metros desde los carriles exteriores.","d) Por una zona que abarca a todas las vías, ampliada en 3 metros desde los carriles exteriores, salvo que haya elemento separador."],tip:"En tramos a cielo abierto: todas las vías + 3 metros desde carriles exteriores, salvo elemento físico separador."},
  {b:3,cat:"def",q:"En el caso de un recinto cuyo acceso al túnel no estuviera delimitado, ¿qué zona tendrá consideración de plataforma de vía?",a:"c) La zona de túnel hasta tres metros hacia el interior del recinto.",opts:["a) La zona de túnel hasta un metro hacia el interior del recinto.","b) La zona de túnel hasta dos metros hacia el interior del recinto.","c) La zona de túnel hasta tres metros hacia el interior del recinto.","d) La zona de túnel hasta cinco metros hacia el interior del recinto."],tip:"Sin delimitación, la plataforma de vía se extiende hasta 3 metros hacia el interior del recinto."},

  // ── BLOQUE 4: NIC 4 — Documento de Programación, CTC, Depósito ──
  {b:4,cat:"def",q:"¿Que figura en el Documento de Programación?",a:"d) entre otros figuran, para cada día, los cortes de tensión previstos que afecten o no a la explotación, los trabajos programados, los recorridos de los trenes de trabajo y los departamentos de Metro que lo solicitaron.",opts:["a) entre otros figuran, para cada día, los cortes de tensión previstos que afecten solamente a la explotación.","b) entre otros figuran, para cada día, los cortes de tensión previstos que afecten o no a la explotación, los trabajos no programados, los recorridos de los trenes de trabajo y los departamentos de Metro que lo solicitaron.","c) entre otros figuran, para cada día, los cortes de tensión previstos que no afecten a la explotación, los trabajos no programados, los recorridos de los trenes que no sean de trabajo y los departamentos de Metro que lo solicitaron.","d) entre otros figuran, para cada día, los cortes de tensión previstos que afecten o no a la explotación, los trabajos programados, los recorridos de los trenes de trabajo y los departamentos de Metro que lo solicitaron."],tip:"El Documento de Programación recoge, para cada día, los cortes de tensión (afecten o no a la explotación), los trabajos programados, los recorridos de los trenes de trabajo y los departamentos que lo solicitaron."},
  {b:4,cat:"def",q:"¿Cómo se conoce el sistema que permite la visualización de la ocupación de los trenes en la línea y el telemando de los enclavamientos de señales?",a:"a) Control de Tráfico Centralizado (CTC)",opts:["a) Control de Tráfico Centralizado (CTC)","b) Control de Tráfico Descentralizado (CTD)","c) Control de Vía Centralizado (CVC)","d) Control de Vía Descentralizado (CVD)"],tip:"El CTC permite visualizar la ocupación de los trenes en la línea y telemandar los enclavamientos de señales."},
  {b:4,cat:"def",q:"Depósito / cochera Es el recinto, provisto de las vías e instalaciones necesarias, donde se encierran trenes para su estancia, revisión, reparación o limpieza. A efectos de esta Normativa, ¿se consideran solamente?",a:"d) las zonas afectadas por la circulación de trenes y su límite será la boca del túnel de acceso a línea, cuando exista, o la señal de salida a vía principal o a saco de maniobras, en cada caso.",opts:["a) las zonas afectadas por la circulación de trenes y su límite será la boca del túnel de acceso a línea, cuando no exista la señal de salida a vía principal","b) las zonas afectadas por la circulación de trenes y su límite será la boca del túnel de acceso a línea, cuando no exista, o la señal de saco de maniobras.","c) las zonas no afectadas por la circulación de trenes y su límite será la boca del túnel de acceso a línea, cuando exista la señal de salida a vía principal o a saco de maniobras, en cada caso.","d) las zonas afectadas por la circulación de trenes y su límite será la boca del túnel de acceso a línea, cuando exista, o la señal de salida a vía principal o a saco de maniobras, en cada caso."],tip:"En depósitos/cocheras solo se consideran las zonas afectadas por la circulación de trenes, limitadas por la boca del túnel de acceso o la señal de salida a vía principal o saco de maniobras."},
  {b:4,cat:"def",q:"¿Qué es el enclavamiento de señales?",a:"d) Sistema electromecánico o electrónico de seguridad que supervisa permanentemente el estado de los circuitos de vía, señales, agujas y calzos de un tramo de vía y permite el control de los mismos por medio de un cuadro de mando local o por medio del CTC.",opts:["a) Sistema electromecánico de seguridad que supervisa permanentemente el estado de los circuitos de vía, señales, agujas y calzos de un tramo de vía y permite el control de los mismos por medio de un cuadro de mando local o por medio del CTC.","b) Sistema electrónico de seguridad que supervisa permanentemente el estado de los circuitos de vía, señales, agujas y calzos de un tramo de vía y permite el control de los mismos por medio de un cuadro de mando local o por medio del CTC.","c) Sistema electromecánico o electrónico de seguridad que supervisa aleatoriamente el estado de los circuitos de vía, señales, agujas y calzos de un tramo de vía y permite el control de los mismos por medio de un cuadro de mando local o por medio del AST","d) Sistema electromecánico o electrónico de seguridad que supervisa permanentemente el estado de los circuitos de vía, señales, agujas y calzos de un tramo de vía y permite el control de los mismos por medio de un cuadro de mando local o por medio del CTC."],tip:"El enclavamiento de señales puede ser electromecánico o electrónico, supervisa permanentemente (no aleatoriamente) y se controla por cuadro de mando local o por el CTC."},
  {b:4,cat:"def",q:"¿Qué es el Control de Tráfico Centralizado (CTC)?",a:"d) Es el Sistema que permite la visualización de la ocupación de los trenes en la línea y el telemando de los enclavamientos de señales.",opts:["a) Es el Sistema que no permite la visualización de la ocupación de los trenes en la línea y el telemando de los enclavamientos de señales.","b) Es el Sistema que permite la visualización de la desocupación de los trenes en la línea.","c) Es el Sistema que permite la visualización de la desocupación de los trenes en la línea y el telemando de los enclavamientos de señales.","d) Es el Sistema que permite la visualización de la ocupación de los trenes en la línea y el telemando de los enclavamientos de señales."],tip:"El CTC visualiza la ocupación (no la desocupación) de los trenes y telemanda los enclavamientos de señales."},
  {b:4,cat:"def",q:"¿Cómo se conoce al recinto, provisto de las vías e instalaciones necesarias, donde se encierran trenes para su estancia, revisión, reparación o limpieza?",a:"a) Depósito / cochera",opts:["a) Depósito / cochera","b) Depósito / Parking","c) Parking / cochera","d) Depósito / cochera / Parking"],tip:"Se conoce como Depósito/cochera."},
  {b:4,cat:"def",q:"¿Cómo se conoce el Sistema electromecánico o electrónico de seguridad que supervisa permanentemente el estado de los circuitos de vía, señales, agujas y calzos de un tramo de vía y permite el control de los mismos por medio de un cuadro de mando local o por medio del CTC?",a:"a) Enclavamiento de señales",opts:["a) Enclavamiento de señales","b) Sytem Mecanic Security (S.M.S)","c) System Electronic Security (S.E.S)","d) System Mecanic Electronic Security (S.M.E.S)"],tip:"Esto se conoce como Enclavamiento de señales."},
  {b:4,cat:"def",q:"¿Qué es el Depósito / cochera?",a:"d) Es el recinto, provisto de las vías e instalaciones necesarias, donde se encierran trenes para su estancia, revisión, reparación o limpieza.",opts:["a) Es el recinto, provisto de las vías e instalaciones necesarias, donde se encierran trenes solo para su estancia.","b) Es el recinto, provisto de las vías e instalaciones necesarias, donde se encierran trenes solo para su revisión.","c) Es el recinto, provisto de las vías e instalaciones necesarias, donde se encierran trenes solo para su reparación o limpieza.","d) Es el recinto, provisto de las vías e instalaciones necesarias, donde se encierran trenes para su estancia, revisión, reparación o limpieza."],tip:"El Depósito/cochera sirve para estancia, revisión, reparación o limpieza, no solo para una de esas funciones."},
  {b:4,cat:"def",q:"¿Cómo se conoce al Documento elaborado por la Comisión de programación, en el que entre otros figuran, para cada día, los cortes de tensión previstos que afecten o no a la explotación, los trabajos programados, los recorridos de los trenes de trabajo y los departamentos de Metro que lo solicitaron?",a:"a) Documento de Programación",opts:["a) Documento de Programación","b) Documento de Previsión","c) Documento Técnico","d) Documento de Previsión y Desarrollo"],tip:"Se conoce como Documento de Programación."},
  {b:4,cat:"def",q:"¿Quién elabora el documento de programación?",a:"d) El documento es elaborado por la Comisión de programación.",opts:["a) El documento es elaborado por la Comisión Técnica.","b) El documento es elaborado por la Comisión de Vía.","c) El documento es elaborado por la Comisión de seguimiento ferroviario.","d) El documento es elaborado por la Comisión de programación."],tip:"El documento de programación lo elabora la Comisión de programación."},

  // ── BLOQUE 5: NIC 5 — Hoja de firmas, Hombre Muerto, Freno de estacionamiento, Equipo de trabajadores, Estación ──
  {b:5,cat:"def",q:"¿Cómo se conoce el impreso que se cumplimenta en el periodo de servicio en una estación, depósito o cochera, donde se registra el enterado de los conductores de los trenes, mediante su firma, de la presencia de trabajadores en la plataforma de vía en un tramo de línea determinado?",a:"a) Hoja de recogida de firmas",opts:["a) Hoja de recogida de firmas","b) Interestación","c) Pliego de entrada","d) Pliego de Salida"],tip:"Se conoce como Hoja de recogida de firmas."},
  {b:5,cat:"def",q:"¿Qué es la Hoja de Recogida de firmas?",a:"d) Impreso que se cumplimenta en el periodo de servicio en una estación, depósito o cochera, donde se registra el enterado de los conductores de los trenes, mediante su firma, de la presencia de trabajadores en la plataforma de vía en un tramo de línea determinado.",opts:["a) Impreso que se cumplimenta fuera del periodo de servicio, pero dentro de una estación, depósito o cochera, donde se registra el enterado de los conductores de los trenes, mediante su firma, de la no presencia de trabajadores en cualquier lugar de la estación.","b) Impreso de fichaje de inicio y finalización de turnos de trabajo. Este documento se deberá rellenar en las consignas de los vestíbulos antes de su acceso a la plataforma de la vía.","c) Impreso que se cumplimenta al finalizar el periodo de servicio en una estación, depósito o cochera, donde se registra el enterado de los conductores de los trenes, mediante su firma, de la presencia de trabajadores en la plataforma de vía en un tramo de línea determinado.","d) Impreso que se cumplimenta en el periodo de servicio en una estación, depósito o cochera, donde se registra el enterado de los conductores de los trenes, mediante su firma, de la presencia de trabajadores en la plataforma de vía en un tramo de línea determinado."],tip:"La Hoja de Recogida de Firmas se cumplimenta DURANTE el periodo de servicio (no fuera ni al finalizar)."},
  {b:5,cat:"def",q:"¿Cómo se conoce al dispositivo que poseen los trenes para prevenir una posible pérdida del control de los mandos del tren por parte del conductor, cuando este conduce de forma manual?",a:"a) Hombre Muerto",opts:["a) Hombre Muerto","b) Alerta Control","c) Hombre Ahogado","d) Sistema de Alerta Perdida de Atención (S.A.P.A)"],tip:"Se conoce como Hombre Muerto."},
  {b:5,cat:"def",q:"¿Cómo se conoce. el freno destinado a inmovilizar un tren de manera permanente. En los vehículos auxiliares clásicos se denomina también freno mecánico?",a:"d) Freno de estacionamiento",opts:["a) Freno de emergencia","b) Freno Neumático","c) Freno de Maniobra","d) Freno de estacionamiento"],tip:"Se conoce como Freno de estacionamiento (también freno mecánico en vehículos auxiliares clásicos)."},
  {b:5,cat:"def",q:"¿Qué es el 'Dispositivo Hombre Muerto'?",a:"d) Dispositivo que poseen los trenes para prevenir una posible pérdida del control de los mandos del tren por parte del conductor, cuando este conduce de forma manual.",opts:["a) Dispositivo que poseen los trenes para prevenir una posible pérdida del control de los mandos del tren por parte del conductor, cuando este conduce de forma automática.","b) Dispositivo que poseen los trenes que no permite la pérdida del control de los mandos del tren por parte del conductor, cuando este conduce de forma manual.","c) Dispositivo que poseen los trenes que no permite la pérdida del control de los mandos del tren por parte del conductor, cuando este conduce de forma automática.","d) Dispositivo que poseen los trenes para prevenir una posible pérdida del control de los mandos del tren por parte del conductor, cuando este conduce de forma manual."],tip:"El Hombre Muerto previene la pérdida de control por parte del conductor cuando conduce de forma MANUAL."},
  {b:5,cat:"def",q:'¿Cuál es la definición de "Freno de estacionamiento"?',a:"d) Es el freno destinado a inmovilizar un tren de manera permanente. En los vehículos auxiliares clásicos se denomina también freno mecánico.",opts:["a) Es el freno destinado a inmovilizar un tren de manera momentánea. En los vehículos auxiliares clásicos se denomina también freno mecánico.","b) Es el freno destinado a inmovilizar un tren de manera momentánea. En los vehículos auxiliares clásicos se denomina también freno tambor.","c) Es el freno destinado a inmovilizar un tren de manera permanente. En los vehículos auxiliares clásicos se denomina también freno tambor.","d) Es el freno destinado a inmovilizar un tren de manera permanente. En los vehículos auxiliares clásicos se denomina también freno mecánico."],tip:"El Freno de estacionamiento inmoviliza el tren de manera PERMANENTE (no momentánea), llamado también freno mecánico."},
  {b:5,cat:"def",q:'¿Qué se conoce com "Equipo de trabajadores"?',a:"c) Grupo de trabajadores que acceden a la plataforma de vía para realizar una misma actividad, solos o conjuntamente con un tren de trabajo (vehículos auxiliares, vehículos bi-viales, etc.), y que pueden encontrase en la misma, de forma agrupada o dispersa.",opts:["a) Grupo de trabajadores que acceden a la plataforma de vía para realizar distinta actividad, solos o conjuntamente con un tren de trabajo (vehículos auxiliares, vehículos bi-viales, etc.), y que pueden encontrase en la misma, de forma agrupada o dispersa.","b) Grupo de trabajadores que acceden a la plataforma de vía para realizar distinta actividad, solos sin un tren de trabajo (vehículos auxiliares, vehículos bi-viales, etc.).","c) Grupo de trabajadores que acceden a la plataforma de vía para realizar una misma actividad, solos o conjuntamente con un tren de trabajo (vehículos auxiliares, vehículos bi-viales, etc.), y que pueden encontrase en la misma, de forma agrupada o dispersa.","d) Grupo de trabajadores que acceden a la plataforma de vía para realizar una misma actividad, solos o conjuntamente sin un tren de trabajo (vehículos auxiliares, vehículos bi-viales, etc.), y que no pueden encontrase en la misma, de forma agrupada o dispersa."],tip:"El Equipo de trabajadores realiza una MISMA actividad (no distinta), y puede ir con o sin tren de trabajo, encontrándose de forma agrupada o dispersa."},
  {b:5,cat:"def",q:"¿Grupo de trabajadores que acceden a la plataforma de vía para realizar una misma actividad, solos o conjuntamente con un tren de trabajo (vehículos auxiliares, vehículos bi-viales, etc.), y que pueden encontrase en la misma, de forma agrupada o dispersa.?",a:"a) Equipo de trabajadores",opts:["a) Equipo de trabajadores","b) Equipo técnico","c) Equipo técnico laboral","d) Operartors Sender Group"],tip:"Esto se conoce como Equipo de trabajadores."},
  {b:5,cat:"def",q:"¿Como se conoce al, conjunto de instalaciones preparado para que los viajeros puedan subir y bajar de los trenes. Sus límites son los piñones de entrada y salida?",a:"a) Estación",opts:["a) Estación","b) Cochera","c) Vestíbulo","d) Tunel"],tip:"Se conoce como Estación."},
  {b:5,cat:"def",q:"¿Qué se conoce como Estación?",a:"d) Conjunto de instalaciones preparado para que los viajeros puedan subir y bajar de los trenes. Sus límites son los piñones de entrada y salida.",opts:["a) Conjunto de instalaciones preparado para que los viajeros puedan subir. Sus límites son los piñones de entrada y salida.","b) Conjunto de instalaciones preparado para que los viajeros puedan bajar de los trenes. Sus límites son los piñones de entrada y salida.","c) Conjunto de instalaciones preparado para que los viajeros puedan subir y bajar de los trenes. Sus límites son los piñones de entrada.","d) Conjunto de instalaciones preparado para que los viajeros puedan subir y bajar de los trenes. Sus límites son los piñones de entrada y salida."],tip:"La Estación permite subir Y bajar de los trenes, con límites en los piñones de entrada Y salida."},

  // ── BLOQUE 6: NIC 6 — Interestación, Pendiente, Marcha a la vista, Marcha a paso de hombre ──
  {b:6,cat:"def",q:"¿Cuál es la definición correcta de Interestación?",a:"d) Es el trayecto comprendido entre el piñón de salida de una estación y el de entrada de la siguiente.",opts:["a) Es el trayecto comprendido entre el piñón de entrada de una estación y el de entrada de la siguiente.","b) Es el trayecto comprendido entre el piñón de salida de una estación y el de salida de la siguiente.","c) Es el trayecto comprendido entre el piñón de entrada de una estación y el de salida de la siguiente.","d) Es el trayecto comprendido entre el piñón de salida de una estación y el de entrada de la siguiente."],tip:"La Interestación va del piñón de SALIDA de una estación al de ENTRADA de la siguiente."},
  {b:6,cat:"def",q:'¿Cuál es la definición correcta de "pendiente"?',a:"d) Plano inclinado de la vía en sentido descendente.",opts:["a) Plano inclinado de la vía en sentido ascendente.","b) Plano plano de la vía en sentido creciente.","c) Plano plano de la vía en sentido decreciente.","d) Plano inclinado de la vía en sentido descendente."],tip:"La pendiente es el plano inclinado de la vía en sentido DESCENDENTE."},
  {b:6,cat:"def",q:"¿Cómo se conoce al trayecto comprendido entre el piñón de salida de una estación y el de entrada de la siguiente?",a:"a) Interestación",opts:["a) Interestación","b) Estación","c) Depósito","d) Cochera"],tip:"Se conoce como Interestación."},
  {b:6,cat:"def",q:"¿Cómo se conoce al periodo comprendido desde la apertura del servicio al público (de aplicación individualizada para cada línea) incrementado en el tiempo necesario para la distribución previa de los trenes a lo largo de la línea, hasta el encierre del último tren de viajeros?",a:"a) Periodo de servicio",opts:["a) Periodo de servicio","b) Periodo laboral","c) Periodo técnico","d) Periodo on time"],tip:"Se conoce como Periodo de servicio."},
  {b:6,cat:'def',q:'¿Cúal es la definición correcta de "Marcha a la vista"?',a:"a) Conducción manual de un tren, que impone al conductor la obligación de avanzar con prudencia, regulando la velocidad, de acuerdo con la parte de vía que visualiza por delante, de forma que sea posible detener el tren ante cualquier persona u obstáculo visible desde la cabina de conducción o ante una señal de parada.",opts:["a) Conducción manual de un tren, que impone al conductor la obligación de avanzar con prudencia, regulando la velocidad, de acuerdo con la parte de vía que visualiza por delante, de forma que sea posible detener el tren ante cualquier persona u obstáculo visible desde la cabina de conducción o ante una señal de parada.","b) Conducción automática de un tren, que impone al conductor la obligación de avanzar con prudencia, regulando la velocidad, de acuerdo con la parte de vía que visualiza por delante, de forma que sea posible detener el tren ante cualquier persona u obstáculo visible desde la cabina de conducción o ante una señal de parada.","c) Conducción manual de un tren, que impone al conductor la obligación de retroceder con prudencia, regulando la velocidad, de acuerdo con la parte de vía que visualiza por delante, de forma que no sea posible detener el tren ante cualquier persona u obstáculo visible desde la cabina de conducción o ante una señal de parada.","d) Conducción automática de un tren, que no impone al conductor la obligación de avanzar con prudencia, regulando la velocidad, de acuerdo con la parte de vía que no visualiza por delante, de forma que sea posible detener el tren ante cualquier persona u obstáculo visible desde la cabina de conducción o ante una señal de parada."],tip:"Marcha a la Vista: conducción MANUAL (no automática), avanzando (no retrocediendo) con prudencia según lo que se visualiza por delante."},
  {b:6,cat:'def',q:'¿Cómo se conoce al "Plano inclinado de la vía en sentido descendente."?',a:"a) Pendiente",opts:["a) Pendiente","b) Rasante","c) Pico","d) Meseta"],tip:"Se conoce como Pendiente."},
  {b:6,cat:'def',q:'¿Cómo se conoce a la "Conducción manual de un tren a una velocidad aproximada de 5 km/h, equivalente a la de una persona andando"?',a:"a) Marcha a paso de hombre",opts:["a) Marcha a paso de hombre","b) Marcha militar","c) Marcha a pasos","d) Marcha técnica"],tip:"Se conoce como Marcha a paso de hombre."},
  {b:6,cat:'def',q:"¿Cómo se conoce a la Conducción manual de un tren, que impone al conductor la obligación de avanzar con prudencia, regulando la velocidad, de acuerdo con la parte de vía que visualiza por delante, de forma que sea posible detener el tren ante cualquier persona u obstáculo visible desde la cabina de conducción o ante una señal de parada?",a:"d) Marcha a la vista",opts:["a) Hombre Ciego","b) Hombre Muerto","c) Auto-shunt","d) Marcha a la vista"],tip:"Se conoce como Marcha a la vista."},
  {b:6,cat:'def',q:'¿Cuál es la definición correcta de "Periodo de servicio "?',a:"d) De aplicación individualizada para cada línea, es el periodo comprendido desde la apertura del servicio al público, incrementado en el tiempo necesario para la distribución previa de los trenes a lo largo de la línea, hasta el encierre del último tren de viajeros.",opts:["a) De aplicación para el conjunto de líneas, es el periodo comprendido desde la apertura del servicio al público, incrementado en el tiempo necesario para la distribución previa de los trenes a lo largo de la línea, hasta el encierre del último tren de viajeros.","b) De aplicación individualizada para cada línea, es el periodo no comprendido desde la apertura del servicio al público, incrementado en el tiempo necesario para la distribución previa de los trenes a lo largo de la línea, hasta el encierre del último tren de viajeros.","c) De aplicación para el conjunto de líneas, es el periodo no comprendido desde la apertura del servicio al público, incrementado en el tiempo necesario para la distribución previa de los trenes a lo largo de la línea, hasta el encierre del último tren de viajeros.","d) De aplicación individualizada para cada línea, es el periodo comprendido desde la apertura del servicio al público, incrementado en el tiempo necesario para la distribución previa de los trenes a lo largo de la línea, hasta el encierre del último tren de viajeros."],tip:"El Periodo de servicio es de aplicación INDIVIDUALIZADA para cada línea (no para el conjunto), y SÍ está comprendido desde la apertura del servicio."},
  {b:6,cat:'def',q:'¿Cuál es la definición correcta de "Marcha a paso de hombre"?',a:"a) Conducción manual de un tren a una velocidad aproximada de 5 km/h, equivalente a la de una persona andando.",opts:["a) Conducción manual de un tren a una velocidad aproximada de 5 km/h, equivalente a la de una persona andando.","b) Conducción manual de un tren a una velocidad aproximada de 10 km/h, equivalente a la de una persona andando.","c) Conducción autómatica de un tren a una velocidad aproximada de 15 km/h, equivalente a la de una persona.","d) Conducción automática de un tren a una velocidad aproximada de 5 km/h, equivalente a la de una persona andando."],tip:"Marcha a paso de hombre: conducción MANUAL (no automática) a 5 km/h aproximadamente."},

  // ── BLOQUE 7: NIC 7 — Plataforma de vía, Piñón, Periodo fuera de servicio ──
  {b:7,cat:"def",q:"¿Cuál es la definición correcta de Plataforma de vía?",a:"c) Es la estructura donde se asientan las vía",opts:["a) Es la estructura donde no se asientan las vía","b) Es la estructura de una estación con todos sus elementos, vías, catenarias, andenes, etc.","c) Es la estructura donde se asientan las vía","d) Es la estructura por la que circulan los viajeros."],tip:"La Plataforma de vía es la estructura donde se asientan las vías."},
  {b:7,cat:"def",q:'¿Cómo se conoce al "punto donde finaliza el andén y comienza la interestación."?',a:"b) Piñón",opts:["a) Piña","b) Piñón","c) Almendra","d) Ramal"],tip:"Se conoce como Piñón."},
  {b:7,cat:"def",q:"¿Cómo se conoce el periodo comprendido desde la finalización del periodo de servicio hasta el inicio del periodo de servicio siguiente, normalmente utilizado para la realización de trabajos nocturnos?",a:"a) Periodo fuera de servicio",opts:["a) Periodo fuera de servicio","b) Periodo de servicio","c) Periodo de descanso","d) Periodo técnico"],tip:"Se conoce como Periodo fuera de servicio."},
  {b:7,cat:'def',q:'¿Cuál es la definición correcta de "Piñón"?',a:"d) Es el punto donde finaliza el andén y comienza la interestación. En las estaciones donde hay una puerta que obstaculiza el paso a la interestación, se considera piñón a este punto.",opts:["a) Es el punto donde inicia el andén y finaliza la interestación. En las estaciones donde hay una puerta que obstaculiza el paso a la interestación, se considera piñón a este punto.","b) Es el punto donde finaliza el andén y comienza la interestación. En las estaciones donde no hay una puerta que obstaculiza el paso a la interestación, se considera piñón a este punto.","c) Es el punto donde finaliza el andén y finaliza la interestación. En las estaciones donde hay una puerta que obstaculiza el paso a la interestación, se considera piñón a este punto.","d) Es el punto donde finaliza el andén y comienza la interestación. En las estaciones donde hay una puerta que obstaculiza el paso a la interestación, se considera piñón a este punto."],tip:"El Piñón es donde finaliza el andén y comienza la interestación; si hay puerta que obstaculiza el paso, ese punto se considera piñón."},
  {b:7,cat:"def",q:"Verdadero o Falso: En el caso de suspensiones de servicio en tramos de línea, en el tramo suspendido se aplicarán las normativas correspondientes al periodo fuera de servicio.",a:"a) Verdadero",opts:["a) Verdadero","b) Falso"],tip:"Verdadero. En tramos suspendidos se aplica la normativa de periodo fuera de servicio."},
  {b:7,cat:"def",q:"¿Por qué está delimitada la plataforma de vía en los tramos de túnel?",a:"b) está delimitada por la sección del propio túnel.",opts:["a) está delimitada por la arista central","b) está delimitada por la sección del propio túnel.","c) está delimitada de forma automática cada 300metros","d) en los tramos de túnel no está delimitada."],tip:"En tramos de túnel, la plataforma de vía está delimitada por la sección del propio túnel."},
  {b:7,cat:"def",q:"Verdadero o Falso: En el caso de suspensiones de servicio en tramos de línea, en el tramo suspendido no se aplicará la normativa correspondiente al periodo fuera de servicio.",a:"b) Falso",opts:["a) Verdadero","b) Falso"],tip:"Falso. SÍ se aplica la normativa correspondiente al periodo fuera de servicio en el tramo suspendido."},
  {b:7,cat:"def",q:"¿Cómo se conoce a la estructura por donde se asientan las vías?",a:"a) Plataforma de vía",opts:["a) Plataforma de vía","b) Camino de vía","c) Plataforma de Vagón","d) Via de circulación."],tip:"Se conoce como Plataforma de vía."},
  {b:7,cat:'def',q:'¿Cuál es la definición correcta de "Periodo fuera de servicio?',a:"d) Es el periodo comprendido desde la finalización del periodo de servicio hasta el inicio del periodo de servicio siguiente, normalmente utilizado para la realización de trabajos nocturnos",opts:["a) Es el periodo comprendido desde la inicialización del periodo de servicio hasta el final del periodo de servicio siguiente, normalmente utilizado para la realización de trabajos nocturnos","b) Es el periodo comprendido desde la finalización del periodo de servicio hasta la próxima finalización del periodo de servicio siguiente, normalmente utilizado para la realización de trabajos diurnos","c) Es el periodo comprendido desde la finalización del periodo de servicio hasta el inicio del periodo de servicio siguiente, normalmente utilizado para la realización de trabajos diurnos","d) Es el periodo comprendido desde la finalización del periodo de servicio hasta el inicio del periodo de servicio siguiente, normalmente utilizado para la realización de trabajos nocturnos"],tip:"El Periodo fuera de servicio va de la finalización a la siguiente apertura, usado normalmente para trabajos NOCTURNOS (no diurnos)."},
  {b:7,cat:"def",q:"En las estaciones donde hay una puerta que obstaculiza el paso a la interestación, ¿Cómo se considera a este punto?",a:"b) Piñón",opts:["a) Piña","b) Piñón","c) Almendra","d) Ramal"],tip:"Ese punto se considera Piñón."},

  // ── BLOQUE 8: NIC 8 — Plataforma de vía en recintos y estaciones ──
  {b:8,cat:"def",q:"Verdadero o Falso: La plataforma de vía, no será de aplicación este concepto en el interior de las naves de depósitos y cocheras.",a:"a) Verdadero",opts:["a) Verdadero","b) Falso"],tip:"Verdadero. El concepto de plataforma de vía no se aplica en el interior de las naves de depósitos y cocheras."},
  {b:8,cat:"def",q:"¿Qué zona tendrá consideración de plataforma de vía en el caso de un recinto cuyo acceso al túnel estuviera delimitado por algún tipo de cerramiento (separadores, vallas, etc.)?",a:"a) la zona de túnel hasta dicho cerramiento.",opts:["a) la zona de túnel hasta dicho cerramiento.","b) la zona de túnel completa.","c) si está delimitado por algún tipo de cerramiento, no se considera plataforma de vía.","d) la zona de túnel anterior a dicho cerramiento hasta la estación siguiente a dicho cerramiento."],tip:"Con cerramiento, la plataforma de vía es la zona de túnel hasta dicho cerramiento."},
  {b:8,cat:"def",q:"¿Qué comprende la plataforma de vía en las estaciones?",a:"c) la zona comprendida entre los andenes o entre el andén y el paramento lateral de la estación.",opts:["a) únicamente la zona comprendida entre los andenes","b) únicamente la zona entre el andén y el paramento lateral de la estación","c) la zona comprendida entre los andenes o entre el andén y el paramento lateral de la estación.","d) está comprendida por una zona que abarca a todas las vías, ampliada en 8 metros desde los carriles exteriores."],tip:"En estaciones, comprende entre andenes, o entre el andén y el paramento lateral."},
  {b:8,cat:"def",q:"¿Cómo está comprendida la plataforma de en los tramos a cielo abierto?",a:"d) Por una zona que abarca a todas las vías, ampliada en 3 metros desde los carriles exteriores, salvo aquellos casos en que estuviera delimitada por algún elemento separador (aceras, viales, setos, etc.).",opts:["a) Por una zona que abarca a todas las vías, ampliada en 1 metros desde los carriles exteriores, salvo aquellos casos en que estuviera delimitada por algún elemento separador (aceras, viales, setos, etc.).","b) Por una zona que abarca a todas las vías, ampliada en 6 metros desde los carriles exteriores, salvo aquellos casos en que estuviera delimitada por algún elemento separador (aceras, viales, setos, etc.).","c) Por una zona que abarca a todas las vías, ampliada en 5metros desde los carriles exteriores, salvo aquellos casos en que estuviera delimitada por algún elemento separador (aceras, viales, setos, etc.).","d) Por una zona que abarca a todas las vías, ampliada en 3 metros desde los carriles exteriores, salvo aquellos casos en que estuviera delimitada por algún elemento separador (aceras, viales, setos, etc.)."],tip:"En tramos a cielo abierto: todas las vías ampliadas en 3 metros desde carriles exteriores, salvo elemento separador."},
  {b:8,cat:"def",q:"En el caso de un recinto cuyo acceso al túnel no estuviera delimitado, ¿Qué zona tendrá la consideración de plataforma de vía?",a:"a) la zona de túnel hasta un metro hacia el interior del recinto.",opts:["a) la zona de túnel hasta un metro hacia el interior del recinto.","b) la zona de túnel hasta dos metros hacia el interior del recinto.","c) la zona de túnel hasta tres metros hacia el interior del recinto.","d) la zona de túnel hasta cinco metros hacia el interior del recinto."],tip:"Sin delimitación, la plataforma de vía llega hasta 1 metro hacia el interior del recinto."}
