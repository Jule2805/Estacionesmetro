<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test NIC - Señales</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #e67e22; /* Naranja NIC */
            --correct: #009543;
            --wrong: #ff3b30;
            --text: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; padding: 20px; }
        
        /* Cabecera estilo imagen */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        #progreso-texto { font-size: 14px; color: #888; }
        .btn-salir {
            background: none; border: 1px solid #444; color: #ccc;
            padding: 5px 12px; border-radius: 5px; cursor: pointer;
        }

        /* Barra de progreso */
        .progress-bar {
            width: 100%; height: 6px; background: #333;
            border-radius: 10px; margin-bottom: 25px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: var(--accent);
            width: 0%; transition: width 0.3s;
        }

        .question-card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { font-size: 1.2rem; line-height: 1.4; margin-bottom: 20px; }

        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            background: #2a2a2a; border: 1px solid #333; color: white;
            padding: 18px; border-radius: 12px; text-align: left;
            font-size: 15px; cursor: pointer; transition: 0.2s;
        }
        .opt-btn.correct { background: var(--correct) !important; border-color: var(--correct); }
        .opt-btn.wrong { background: var(--wrong) !important; border-color: var(--wrong); }

        .btn-next {
            width: 100%; background: var(--accent); color: white;
            border: none; padding: 15px; border-radius: 10px;
            font-weight: bold; margin-top: 20px; cursor: pointer;
            display: none; /* Solo se muestra al fallar */
        }

        /* Resultados finales */
        .results-list {
            text-align: left; background: #000; padding: 15px;
            border-radius: 10px; font-size: 13px; max-height: 300px;
            overflow-y: auto; margin-top: 15px;
        }
        .result-item { margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <div class="quiz-header">
            <div id="progreso-texto">Pregunta 1/60</div>
            <button class="btn-salir" onclick="window.location.href='nic.html'">✕ Salir</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        
        <div class="question-card">
            <h2 id="question-text">Cargando pregunta...</h2>
            <div id="options-container" class="options-grid"></div>
            <button id="btn-next" class="btn-next" onclick="nextQuestion()">SIGUIENTE PREGUNTA</button>
        </div>
    </div>

    <div id="results-screen" class="hidden">
        <div class="question-card" style="text-align:center;">
            <h1 id="score-percent">0%</h1>
            <p id="score-text"></p>
            <div id="failed-review" class="results-list"></div>
            <button class="btn-next" style="display:block;" onclick="location.reload()">REPETIR TEST</button>
            <button class="btn-next" style="display:block; background:#444;" onclick="window.location.href='nic.html'">MENU NIC</button>
        </div>
    </div>
</div>

<script>

        { q: "¿Qué función tiene el cartel de 'Señal de vía muerta'?", a: "Indicar que la vía no tiene salida y termina en un tope fijo", opts: ["Indicar que la vía no tiene salida y termina en un tope fijo", "Vía baja explotación", "Vía sin tensión", "Final enclavamiento"] },

        { q: "¿Qué significa el cartel de 'Señal de prohibición'?", a: "Indica una acción que el conductor tiene prohibido realizar en ese punto", opts: ["Indica una acción que el conductor tiene prohibido realizar en ese punto", "Prohibido viajeros", "Prohibido sin ATO", "Prohibido fotos flash"] },

        { q: "¿Qué indica el cartel de 'Señal de información'?", a: "Proporciona datos útiles sobre la explotación o la infraestructura", opts: ["Proporciona datos útiles sobre la explotación o la infraestructura", "Nombre próxima estación", "Hora sincronizada", "Tráfico exterior"] },

        { q: "¿Qué significa una bandera amarilla o una luz amarilla como señal portátil?", a: "Orden de circular con precaución", opts: ["Orden de circular con precaución", "Señal fuera servicio", "Fin limitación temporal", "Personal a 50m"] },
        { q: "¿Qué función tienen las balizas rojas en la vía?", a: "Delimitar áreas de trabajo o protección prohibiendo el paso de trenes", opts: ["Delimitar áreas de trabajo o protección prohibiendo el paso de trenes", "Posición agujas noche", "Centro vía mantenimiento", "Apoyo sacos maniobras"] },
        { q: "¿Qué indica una luz blanca o un banderín blanco como señal portátil?", a: "Vía libre o autorización para iniciar un movimiento", opts: ["Vía libre o autorización para iniciar un movimiento", "Circula a contravía", "Responsable operativo", "Alumbrado se apaga"] },
        { q: "¿Qué significa una señal fundamental que está apagada o cuya indicación es dudosa?", a: "Debe considerarse como señal de parada (rojo)", opts: ["Debe considerarse como señal de parada (rojo)", "Rebasar marcha a la vista", "Enclavamiento modo local", "No tiene valor"] }
    ];

    let currentIdx = 0;
    let hits = 0;
    let fails = [];

    function initQuiz() {
        showQuestion();
    }

    function showQuestion() {
        const q = db[currentIdx];
        document.getElementById('progreso-texto').innerText = `Pregunta ${currentIdx + 1}/${db.length}`;
        document.getElementById('progress-fill').style.width = `${(currentIdx / db.length) * 100}%`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('btn-next').style.display = "none";

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        // Mezclar opciones
        const shuffled = [...q.opts].sort(() => Math.random() - 0.5);

        shuffled.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, q.a);
            container.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct) {
        const buttons = document.querySelectorAll('.opt-btn');
        buttons.forEach(b => b.disabled = true);

        if (selected === correct) {
            btn.classList.add('correct');
            hits++;
            // PASA SOLO SI ESTÁ BIEN (tras 0.8 seg)
            setTimeout(nextQuestion, 800);
        } else {
            btn.classList.add('wrong');
            // GUARDAR FALLO
            fails.push({ q: db[currentIdx].q, a: correct });
            guardarFallo(db[currentIdx].q, db[currentIdx].opts, correct, "NIC: Señales");

            // Mostrar la correcta
            buttons.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
            // NO PASA SOLO, espera al botón
            document.getElementById('btn-next').style.display = "block";
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < db.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        
        const percent = Math.round((hits / db.length) * 100);
        document.getElementById('score-percent').innerText = `${percent}%`;
        document.getElementById('score-text').innerText = `Has acertado ${hits} de ${db.length}`;

        const review = document.getElementById('failed-review');
        if (fails.length > 0) {
            review.innerHTML = '<strong>Tus errores:</strong><br><br>' + 
                fails.map(f => `<div class="result-item">• ${f.q}<br><span style="color:var(--correct)">✔ ${f.a}</span></div>`).join('');
        } else {
            review.innerHTML = "¡Perfecto! No has tenido fallos.";
        }
    }

    function guardarFallo(pregunta, opciones, respuestaCorrecta, modulo) {
        let listaFallos = JSON.parse(localStorage.getItem('mis_fallos')) || [];
        const nuevoFallo = {
            id: Date.now(),
            modulo: modulo,
            q: pregunta,
            opts: opciones,
            a: respuestaCorrecta
        };
        if (!listaFallos.find(f => f.q === pregunta)) {
            listaFallos.push(nuevoFallo);
            localStorage.setItem('mis_fallos', JSON.stringify(listaFallos));
        }
    }

    initQuiz();
</script>

</body>
</html>
